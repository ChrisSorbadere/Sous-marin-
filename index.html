<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d1411">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="U-Boot">
<title>U-Boot — Chasse en Atlantique</title>
<style>
  :root{
    --steel:#1a201d; --steel2:#222a26; --panel:#111714;
    --brass:#c9a24b; --brass-d:#8a6e2e; --amber:#e8b94a;
    --phos:#5ff08a; --phos-d:#1d6b3a; --phos-dim:#0e2b1a;
    --red:#e0533a; --red-d:#7a2417; --ink:#0a0d0b;
    --txt:#d8e0d4; --txt-dim:#98a696;
    --rivet:#0c100e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:#060907;overscroll-behavior:none}
  body{
    font-family:"Consolas","SF Mono",ui-monospace,monospace;
    color:var(--txt); display:flex;flex-direction:column;height:100dvh;overflow:hidden;
    user-select:none;
  }
  /* ---- top tabs ---- */
  .tabs{display:flex;background:linear-gradient(#1c231f,#10150f);
    border-bottom:2px solid #000;box-shadow:0 2px 0 var(--brass-d) inset;
    padding-top:env(safe-area-inset-top,0)}
  .tab{flex:1;text-align:center;padding:11px 6px 9px;font-size:13px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--txt-dim);cursor:pointer;
    border-right:1px solid #000;font-weight:700}
  .tab:last-child{border-right:none}
  .tab.on{color:var(--amber);background:linear-gradient(#2a342c,#161d18);
    box-shadow:0 -3px 0 var(--brass) inset}
  #bMute,#bTC{flex:0 0 auto;background:none;border:0;border-left:1px solid #000;
    color:#8fa;font-size:16px;padding:0 14px;cursor:pointer}
  #bTC{font-size:12px;font-weight:700;letter-spacing:.05em}
  #bTC.on{color:var(--amber)}
  /* ---- stage ---- */
  #stage{position:relative;flex:1;min-height:0}
  .view{position:absolute;inset:0;display:none}
  .view.on{display:block}
  canvas{display:block;width:100%;height:100%;background:var(--ink)}
  /* ---- status bar ---- */
  #status{display:flex;background:linear-gradient(#10150f,#070a08);
    border-top:2px solid var(--brass-d);font-size:11px;letter-spacing:.04em}
  .gz{flex:1;text-align:center;padding:6px 2px 7px;border-right:1px solid #000}
  .gz:last-child{border-right:none}
  .gz .l{color:var(--txt-dim);font-size:9px;text-transform:uppercase;letter-spacing:.1em}
  .gz .v{color:var(--amber);font-size:16px;font-weight:700;line-height:1.15}
  .gz.warn .v{color:var(--red)}
  /* ---- night red-light mode ---- */
  body.night #stage, body.night #status, body.night #ctl, body.night .tabs{
    filter:sepia(.35) hue-rotate(-28deg) saturate(1.5) brightness(.92)}
  /* ---- detection alert border ---- */
  #alert{position:absolute;inset:0;z-index:12;pointer-events:none;opacity:0}
  #alert.on{opacity:1;animation:alertPulse 1.1s ease-in-out infinite}
  @keyframes alertPulse{0%,100%{box-shadow:inset 0 0 0 2px rgba(224,83,58,.25)}
    50%{box-shadow:inset 0 0 22px 6px rgba(224,83,58,.55)}}
  /* ---- detection bar ---- */
  .dbar{height:4px;margin:2px 6px 0;background:#101511;border-radius:2px;overflow:hidden}
  .dbar i{display:block;height:100%;width:0%;background:var(--phos);border-radius:2px;
    transition:width .25s,background .25s}
  /* ---- tutorial bubble ---- */
  #tuto{position:absolute;left:10px;right:10px;bottom:64px;z-index:15;display:none;
    background:rgba(10,18,12,.95);border:1px solid var(--phos-d);border-left:4px solid var(--phos);
    border-radius:5px;padding:10px 12px;font-size:12.5px;line-height:1.5;color:var(--txt)}
  #tuto.on{display:block}
  #tuto b{color:var(--phos)}
  #tuto .tOK{float:right;margin-left:10px;background:none;border:1px solid var(--phos-d);
    color:var(--phos);border-radius:3px;padding:3px 10px;font:inherit;font-size:11px}
  /* ---- controls grip ---- */
  #ctlGrip{text-align:center;font-size:10px;letter-spacing:.14em;color:var(--txt-dim);
    text-transform:uppercase;padding:2px 0 1px;cursor:pointer}
  #ctl.fold .row{display:none}
  /* ---- controls panel ---- */
  #ctl{background:linear-gradient(#171d19,#0c110e);border-top:2px solid #000;
    padding:6px 8px 7px;display:flex;flex-direction:column;gap:6px}
  .row{display:flex;gap:5px;align-items:stretch}
  button.b{flex:1;background:linear-gradient(#2c352e,#171d18);color:var(--txt);
    border:1px solid #000;border-top:1px solid #3a463c;border-radius:3px;
    padding:6px 4px;font:inherit;font-size:12px;font-weight:700;letter-spacing:.03em;
    cursor:pointer;text-transform:uppercase;box-shadow:0 1px 0 #000}
  button.b:active{background:linear-gradient(#11160f,#222a24);transform:translateY(1px)}
  button.b:disabled{color:#4c584e;background:linear-gradient(#1a201b,#12160f);cursor:default}
  button.b.on{color:var(--phos);border-top-color:var(--phos-d);
    box-shadow:0 0 0 1px var(--phos-d) inset}
  button.b.fire{color:#ffd9c9;background:linear-gradient(#5a261b,#34140d);
    border-top-color:var(--red)}
  button.b.fire:disabled{color:#6b4b42;background:linear-gradient(#241712,#1a1009);
    border-top-color:#3a221b;cursor:default}
  button.b.sm{flex:0 0 auto;min-width:42px;font-size:15px;padding:6px 10px}
  .lbl{flex:0 0 64px;display:flex;align-items:center;justify-content:center;
    font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-dim);
    text-align:center;line-height:1.05}
  /* ---- map return-to-base button ---- */
  #mapCtl{position:absolute;left:10px;top:10px;z-index:6}
  #mapCtl button{background:rgba(10,16,12,.8);color:var(--amber);border:1px solid var(--brass-d);
    border-radius:4px;padding:7px 11px;font:inherit;font-size:11px;font-weight:700;
    letter-spacing:.04em;text-transform:uppercase}
  #mapCtl button:active{background:rgba(30,24,12,.9)}
  /* ---- periscope scope controls ---- */
  #scopeCtl{position:absolute;left:0;right:0;bottom:10px;display:flex;justify-content:center;
    gap:8px;pointer-events:none;z-index:6}
  #scopeCtl button{pointer-events:auto;background:rgba(10,16,12,.78);color:var(--phos);
    border:1px solid var(--phos-d);border-radius:4px;padding:8px 14px;font:inherit;font-size:12px;
    font-weight:700;letter-spacing:.05em;text-transform:uppercase}
  #scopeCtl button:active{background:rgba(20,40,28,.9)}
  /* ---- hit flash ---- */
  #flash{position:absolute;inset:0;z-index:9;pointer-events:none;opacity:0;
    background:radial-gradient(circle at 50% 45%, rgba(255,210,130,.75), rgba(255,120,40,.30) 38%, transparent 70%)}
  /* ---- message log ---- */
  #log{position:absolute;left:8px;right:8px;bottom:58px;pointer-events:none;
    display:flex;flex-direction:column;gap:3px;z-index:8}
  .msg{align-self:flex-start;max-width:92%;background:rgba(8,14,10,.86);
    border-left:3px solid var(--phos-d);padding:4px 9px;font-size:11px;
    color:var(--phos);letter-spacing:.02em;animation:fade 7s forwards}
  .msg.cmd{border-left-color:var(--amber);color:var(--amber)}
  .msg.alarm{border-left-color:var(--red);color:var(--red)}
  @keyframes fade{0%{opacity:0;transform:translateX(-8px)}6%{opacity:1;transform:none}
    85%{opacity:1}100%{opacity:0}}
  /* ---- overlay (briefing / end) ---- */
  #ovl{position:absolute;inset:0;z-index:20;background:rgba(4,7,5,.94);
    display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;
    padding:calc(env(safe-area-inset-top,0px) + 16px) 16px 28px}
  #ovl.hide{display:none}
  .card{max-width:440px;width:100%;background:linear-gradient(#141a16,#0a0e0b);
    border:1px solid var(--brass-d);border-top:3px solid var(--brass);
    border-radius:4px;padding:22px 22px 20px;box-shadow:0 14px 50px #000}
  .card h1{margin:0 0 2px;font-size:18px;letter-spacing:.14em;color:var(--amber);
    text-transform:uppercase}
  .card .sub{font-size:11px;color:var(--phos);letter-spacing:.2em;margin-bottom:14px;
    text-transform:uppercase}
  .card p{font-size:13px;line-height:1.55;color:var(--txt);margin:0 0 12px}
  .card .obj{font-size:12px;color:var(--txt-dim);line-height:1.7;margin-bottom:16px}
  .card .ktb{margin:6px 0 14px;text-align:left}
  .card .ktbT{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);margin-bottom:4px}
  .card .ktb table{width:100%;border-collapse:collapse;font-size:11px;color:var(--txt)}
  .card .ktb td{padding:3px 5px;border-bottom:1px solid rgba(120,150,120,.14)}
  .card .obj b{color:var(--phos)}
  .card .res{font-size:15px;font-weight:700;letter-spacing:.06em;margin:0 0 12px}
  .res.win{color:var(--phos)} .res.lose{color:var(--red)}
  .go{display:block;width:100%;background:linear-gradient(#3a4a3c,#1c241e);
    color:var(--amber);border:1px solid var(--brass-d);border-top:1px solid var(--brass);
    border-radius:3px;padding:13px;font:inherit;font-size:14px;font-weight:700;
    letter-spacing:.12em;text-transform:uppercase;cursor:pointer}
  .go:active{transform:translateY(1px)}
  .hint{font-size:10px;color:var(--txt-dim);line-height:1.6;margin-top:12px;
    border-top:1px solid #1c241e;padding-top:10px}
  .hint b{color:var(--txt)}
  /* ---- comms / stations ---- */
  #comms{position:absolute;inset:0;overflow-y:auto;padding:10px 10px 14px;
    background:radial-gradient(120% 80% at 50% 0%,#10160f,#070a07)}
  .stn{background:linear-gradient(#161d18,#0d120f);border:1px solid #000;
    border-left:3px solid var(--phos-d);border-radius:3px;padding:7px 11px 8px;margin-bottom:8px}
  .stn h3{margin:0 0 5px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber)}
  .stn .ln{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;padding:2px 0}
  .stn .ln b{color:var(--txt-dim);font-weight:400}
  .stn .ln span{color:var(--txt);text-align:right}
  .ok{color:var(--phos)!important} .amb{color:var(--amber)!important} .bad{color:var(--red)!important}
</style>
</head>
<body>

<div class="tabs">
  <div class="tab on" data-v="cockpit">Poste de pilotage</div>
  <div class="tab" data-v="peri">Périscope</div>
  <div class="tab" data-v="map">Carte tactique</div>
  <div class="tab" data-v="comms">Postes</div>

<div id="stage">
  <div class="view on" data-v="cockpit"><canvas id="cvCock"></canvas></div>
  <div class="view" data-v="peri"><canvas id="cvPeri"></canvas>
    <div id="scopeCtl">
      <button id="scopeL">◄ Scope</button>
      <button id="scopeTDC">TDC</button>
      <button id="scopeC">Cap</button>
      <button id="scopeR">Scope ►</button>
    </div>
  </div>
  <div class="view" data-v="map"><canvas id="cvMap"></canvas>
    <div id="mapCtl"><button id="btnBase">⚓ Rentrer à la base</button></div>
  </div>

  <div id="log"></div>

</div>

<div id="status">
  <div class="gz" id="gDepth"><div class="l">Profondeur</div><div class="v" id="sDepth">0</div></div>

    <div class="dbar"><i id="dbarI"></i></div></div>
  <div class="gz" id="gHull"><div class="l">Coque</div><div class="v" id="sHull">100%</div></div>
  <div class="gz" id="gBatt"><div class="l">Batterie</div><div class="v" id="sBatt">100%</div></div>
</div>

<div id="ctl">
  <div id="ctlGrip">▾ masquer les commandes</div>
  <div class="row">
    <div class="lbl">Gouvernail</div>
    <button class="b sm" data-h="bab">◄</button>
    <button class="b" data-act="rudderC">Cap stable</button>
    <button class="b sm" data-h="tri">►</button>
  </div>
  <div class="row">
    <div class="lbl">Machine</div>
    <button class="b" data-spd="0">Stop</button>
    <button class="b on" data-spd="1">Lente</button>
    <button class="b" data-spd="2">Moy.</button>
    <button class="b" data-spd="3">Rapide</button>
  </div>
  <div class="row">
    <div class="lbl">Immersion</div>
    <button class="b" data-set="0">Surface</button>
    <button class="b" data-set="12">Périsc.</button>
    <button class="b sm" data-step="-15">▲</button>
    <button class="b sm" data-step="15">▼</button>
  </div>
  <div class="row">
    <div class="lbl">Urgence</div>
    <button class="b" id="bCrash">⚡ Plongée</button>
    <button class="b" id="bBlow">⚡ Surface</button>
    <button class="b" id="bGun">Canon</button>
    <button class="b" id="bDecoy">Leurre</button>
  </div>
  <div class="row">
    <button class="b" id="bPeri">Périscope ▲</button>
    <button class="b" id="bSilent">Silence</button>
    <button class="b fire" id="bFire">Feu</button>
    <button class="b fire" id="bSalvo">Salve</button>
  </div>
</div>

<script>
(()=>{
"use strict";
const $=s=>document.querySelector(s);
const TAU=Math.PI*2, R2D=180/Math.PI, D2R=Math.PI/180;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const dist=(ax,ay,bx,by)=>Math.hypot(ax-bx,ay-by);
const angTo=(ax,ay,bx,by)=>Math.atan2(by-ay,bx-ax);
const norm=a=>{while(a<-Math.PI)a+=TAU;while(a>Math.PI)a-=TAU;return a;};

/* ---------- terrain (seabed + landmasses) ---------- */
function genTerrain(coastChance=0.5){
  const deep=250, blobs=[];
  if(Math.random()<coastChance){
    // a coastline hugging the left or right edge (convoy lane stays clear in the centre)
    const right=Math.random()<0.5;
    const ex = right ? WORLD*1.18 : -WORLD*0.18;
    blobs.push({x:ex, y:WORLD*(0.2+Math.random()*0.6),
      rx:WORLD*0.50, ry:WORLD*(0.75+Math.random()*0.4), shoal:1.5});
    if(Math.random()<0.55){                      // sometimes an island off that coast
      const ix = right ? WORLD*(0.72+Math.random()*0.12) : WORLD*(0.16+Math.random()*0.12);
      blobs.push({x:ix, y:WORLD*(0.25+Math.random()*0.5),
        rx:WORLD*(0.07+Math.random()*0.05), ry:WORLD*(0.07+Math.random()*0.06), shoal:1.9});
    }
  }
  // occasional treacherous reefs (shallow patches that don't break the surface)
  const nReef=Math.random()<0.5?(Math.random()<0.4?2:1):0;
  for(let i=0;i<nReef;i++){
    blobs.push({x:WORLD*(0.2+Math.random()*0.6), y:WORLD*(0.2+Math.random()*0.6),
      rx:WORLD*(0.05+Math.random()*0.05), ry:WORLD*(0.05+Math.random()*0.05),
      shoal:2.2, reef:true, minD:14+Math.random()*14});
  }
  return {deep,blobs};
}
function seabedAt(x,y){
  const T=G.terrain; let dep=T.deep;
  for(const b of T.blobs){
    const dx=(x-b.x)/b.rx, dy=(y-b.y)/b.ry, d=Math.sqrt(dx*dx+dy*dy);
    if(b.reef){                                   // shallow patch, never breaks the surface
      if(d<b.shoal){ const t=clamp(d/b.shoal,0,1); dep=Math.min(dep, b.minD+(T.deep-b.minD)*t); }
    } else {
      if(d<1) return 0;                           // land
      const t=clamp((d-1)/(b.shoal-1),0,1);
      dep=Math.min(dep, 10*(1-t)+T.deep*t);
    }
  }
  return dep;
}
function landAt(x,y){ return seabedAt(x,y)<=0.5; }

/* ---------- world constants ---------- */
const WORLD=6000;           // meters across the playable sea
const KN=0.514;             // 1 knot in m/s
const SPEEDS=[0,2.5,5,8];   // machine settings, knots (submerged)
const CRUSH=210;            // crush depth (m) — rated limit
const MAXDEPTH=300;         // absolute max the boat can reach
const PERISCOPE_DEPTH=14;   // max depth to raise periscope
const SIM=4;                // sim seconds per real second (pacing)
const TORP_SPD=14;          // m/s (~27 kn)
const TORP_RANGE=3200;      // m

/* ---------- audio : real samples (sons/) + underwater reverb ---------- */
let AC=null, master=null, reverb=null;
let SND={}, sndReady=false, loops=null, sndOK=0, sndFail=[], sndDiag={};
let muted=(()=>{ try{return localStorage.getItem("uboot_mute")==="1";}catch(e){return false;} })();
const SND_FILES={
  sonar:     ["sonar.mp3","Sonar.mp3","sons/sonar.mp3"],
  explosion: ["explosion.mp3","Explosion.mp3","sons/explosion.mp3"],
  klaxon:    ["klaxon.mp3","Klaxon.mp3","Klaxon__Alarme_plongée_.mp3","sons/klaxon.mp3"],
  torpille:  ["torpille.mp3","Torpille.mp3","sons/torpille.mp3"],
  diesel:    ["diesel.mp3","Diesel.mp3","sons/diesel.mp3"],
  electrique:["electrique.mp3","Electrique.mp3","sons/electrique.mp3"],
  mer:       ["mer.mp3","Mer.mp3","Vent_Vagues_Long.mp3","sons/mer.mp3"]
};
const SND_TOTAL=Object.keys(SND_FILES).length;
function updateSndStat(){
  const el=document.getElementById("sndStat"); if(!el) return;
  if(!sndReady){ el.textContent="Sons : chargement…"; return; }
  if(sndOK===SND_TOTAL) el.textContent="🔊 Sons réels : "+sndOK+"/"+SND_TOTAL+" chargés ✓";
  else el.innerHTML="⚠ Sons "+sndOK+"/"+SND_TOTAL+" chargés — <u>toucher pour le détail</u>";
  el.style.cursor="pointer";
  el.onclick=()=>{ const lines=Object.entries(sndDiag).map(([k,v])=>k+" : "+v).join("\n");
    alert("Diagnostic des sons\n(base : "+location.href.replace(/[^/]*$/,'')+")\n\n"+(lines||"aucune info")); };
}
function audio(){
  if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)();
    master=AC.createGain(); master.gain.value=muted?0:1; master.connect(AC.destination);
    const len=Math.floor(AC.sampleRate*1.7), ir=AC.createBuffer(2,len,AC.sampleRate);   // convolution reverb
    for(let ch=0;ch<2;ch++){ const d=ir.getChannelData(ch);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.6); }
    reverb=AC.createConvolver(); reverb.buffer=ir;
    const wet=AC.createGain(); wet.gain.value=.35; reverb.connect(wet).connect(master);
    loadSounds();
  }catch(e){} }
  if(AC&&AC.state==="suspended"){ try{AC.resume();}catch(e){} }
  return AC;
}
function dest(){ return master||(AC&&AC.destination); }
async function loadSounds(){
  sndOK=0; sndFail=[]; sndDiag={};
  const jobs=Object.entries(SND_FILES).map(async ([k,urls])=>{
    let info="";
    for(const url of urls){
      try{
        const r=await fetch(url);
        if(!r.ok){ info=url+" → HTTP "+r.status; continue; }
        const ct=r.headers.get("content-type")||"";
        const ab=await r.arrayBuffer();
        if(/text|html/i.test(ct)){ info=url+" → reçu du "+ct+" (pas un mp3)"; continue; }
        try{ SND[k]=await AC.decodeAudioData(ab); sndOK++; sndDiag[k]="OK ("+url+")"; return; }
        catch(de){ info=url+" → décodage impossible ("+ab.byteLength+" o, type "+ct+")"; continue; }
      }catch(e){ info=url+" → erreur réseau"; }
    }
    sndFail.push(k); sndDiag[k]=info||"introuvable";
  });
  await Promise.all(jobs);
  sndReady=true; startLoops(); updateSndStat();
}
function startLoops(){
  if(!AC||loops) return;
  const mk=(buf)=>{ if(!buf) return {gain:{setTargetAtTime(){}, value:0}, rate:null};
    const s=AC.createBufferSource(), g=AC.createGain();
    s.buffer=buf; s.loop=true; g.gain.value=0; s.connect(g).connect(dest()); s.start();
    return {gain:g.gain, rate:s.playbackRate}; };
  loops={ diesel:mk(SND.diesel), electrique:mk(SND.electrique), mer:mk(SND.mer) };
}
addEventListener("pointerdown",()=>audio(),{once:true});
function vibrate(p){ if(muted||!navigator.vibrate) return; try{ navigator.vibrate(p); }catch(e){} }
// one-shot sample player (optionally through the reverb) — returns true if a sample actually played
function play(name,vol,wet,rate){
  const ac=audio(); if(!ac||!SND[name]) return false;
  const s=ac.createBufferSource(), g=ac.createGain();
  s.buffer=SND[name]; if(rate) s.playbackRate.value=rate;
  g.gain.value=vol==null?1:vol;
  s.connect(g); g.connect(dest()); if(wet&&reverb) g.connect(reverb);
  s.start(); return true;
}
// fallback synths (used only if a sample is missing) — deliberately DISTINCT from the old build
function tone(freq,vol,dur,type,slide){ const ac=audio(); if(!ac)return; const t=ac.currentTime;
  const o=ac.createOscillator(),g=ac.createGain(); o.type=type||"sine"; o.frequency.setValueAtTime(freq,t);
  if(slide) o.frequency.exponentialRampToValueAtTime(slide,t+dur);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+.01); g.gain.exponentialRampToValueAtTime(.0004,t+dur);
  o.connect(g); g.connect(dest()); if(reverb) g.connect(reverb); o.start(t); o.stop(t+dur+.02); }
function ping(freq,vol){ if(!play("sonar", vol!=null?Math.min(1,vol*4):.9, true)) tone(760,.14,.5,"sine",560); }
function boom(){ if(!play("explosion",1,true)) tone(150,.6,.5,"sine",42); }
function klaxon(){ if(!play("klaxon",.9,false)){ tone(430,.14,.32,"sawtooth"); setTimeout(()=>tone(320,.14,.4,"sawtooth"),330);} }
function launchSfx(){ if(!play("torpille",.9,false)) tone(900,.12,.5,"sawtooth",300); }
// hull groan — kept synthesized (no sample supplied)
function creak(){
  const ac=audio(); if(!ac)return; const t=ac.currentTime;
  const n=Math.max(1,Math.floor(ac.sampleRate*.6)), buf=ac.createBuffer(1,n,ac.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,0.8);
  const src=ac.createBufferSource(); src.buffer=buf;
  const bp=ac.createBiquadFilter(); bp.type="bandpass"; bp.Q.value=9;
  bp.frequency.setValueAtTime(260,t); bp.frequency.exponentialRampToValueAtTime(680,t+.5);
  const g=ac.createGain(); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.22,t+.05); g.gain.exponentialRampToValueAtTime(.001,t+.6);
  src.connect(bp).connect(g); g.connect(dest()); if(reverb) g.connect(reverb); src.start(t);
  const o=ac.createOscillator(), lp=ac.createBiquadFilter(), og=ac.createGain();
  o.type="sawtooth"; o.frequency.setValueAtTime(120,t); o.frequency.exponentialRampToValueAtTime(78,t+.5);
  lp.type="lowpass"; lp.frequency.value=380;
  og.gain.setValueAtTime(.07,t); og.gain.exponentialRampToValueAtTime(.001,t+.55);
  o.connect(lp).connect(og).connect(dest()); o.start(t); o.stop(t+.55);
}
function heartbeat(){
  const ac=audio(); if(!ac)return;
  const thump=(start)=>{ const t=ac.currentTime+start, o=ac.createOscillator(), g=ac.createGain();
    o.type="sine"; o.frequency.setValueAtTime(92,t); o.frequency.exponentialRampToValueAtTime(46,t+.12);
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.26,t+.02); g.gain.exponentialRampToValueAtTime(.001,t+.18);
    o.connect(g).connect(dest()); o.start(t); o.stop(t+.2); };
  thump(0); thump(.22);
}

function engineStop(){                       // menu / game over: fade every ambience loop out

let hydroT=0;
function updateHydrophone(dt){
  hydroT-=dt; if(hydroT>0) return; hydroT=0.5;
  G.sound=[];
  const s=G.sub;
  if(s.depth<4){ return; }                       // surfaced: own wash drowns the hydrophone
  const range=clamp(HYDRO_BASE - s.vel*520, 900, HYDRO_BASE);
  for(const c of G.contacts){
    if(!c.alive) continue;
    const dM=dist(s.x,s.y,c.x,c.y);
    if(dM>range) continue;
    if(c.berr===undefined) c.berr=0;
    c.berr=clamp(c.berr+(Math.random()-.5)*0.03,-0.18,0.18);  // slowly drifting bearing error
    const err=(dM/range)*0.14 + G.env.weather.sea*0.05;
    G.sound.push({b:angTo(s.x,s.y,c.x,c.y)+c.berr*err*6, strong:dM<2300, type:c.type});
  }
}

function updatePlanes(dt){
  const s=G.sub;
  if(G.air){ G.planeT-=dt; if(G.planeT<=0 && G.planes.length<1){ spawnPlane(); G.planeT=200+Math.random()*160; } }
  for(const p of G.planes){
    if(p.state==="patrol"){
      // spotting range depends on depth: easy on the surface, harder at periscope depth, none if deep
      const spotR = s.depth<6 ? 1300 : s.depth<14 ? 650 : 0;
      if(spotR>0 && dist(p.x,p.y,s.x,s.y)<spotR){
        p.state="attack"; p.tx=s.x; p.ty=s.y;
        sayOnce("air","Avion droit sur nous — plongée d'urgence !","alarm"); }
    } else if(p.state==="attack"){
      if(s.depth<16){ p.tx=s.x; p.ty=s.y; }        // keeps track only while shallow
      if(dist(p.x,p.y,p.tx,p.ty)<170 && p.dropT<=0){ planeAttack(p); p.dropT=3; p.state="leave"; saidOnce.air=0; }
      const da=norm(angTo(p.x,p.y,p.tx,p.ty)-p.hdg); p.hdg=norm(p.hdg+clamp(da,-0.5*dt,0.5*dt));
    }
    if(p.dropT>0) p.dropT-=dt;
    p.x+=Math.cos(p.hdg)*p.spd*dt; p.y+=Math.sin(p.hdg)*p.spd*dt;
  }
  G.planes=G.planes.filter(p=>p.x>-400&&p.x<WORLD+400&&p.y>-400&&p.y<WORLD+400);
}

/* ---------- touch input : map (pinch-zoom, pan, tap-course) ---------- */
const MAPV={z:1, cx:WORLD/2, cy:WORLD/2, toWorld:null};
{
  const el=$("#cvMap"), pts=new Map(); let moved=0, lastTap=0, pinch0=0, z0=1;
  el.style.touchAction="none";
  el.addEventListener("pointerdown",e=>{ pts.set(e.pointerId,{x:e.offsetX*DPR,y:e.offsetY*DPR}); moved=0;
    if(pts.size===2){ const a=[...pts.values()]; pinch0=dist(a[0].x,a[0].y,a[1].x,a[1].y); z0=MAPV.z; } });
  el.addEventListener("pointermove",e=>{
    if(!pts.has(e.pointerId)) return;
    const p=pts.get(e.pointerId), nx=e.offsetX*DPR, ny=e.offsetY*DPR;
    const dx=nx-p.x, dy=ny-p.y; moved+=Math.abs(dx)+Math.abs(dy);
    if(pts.size===2){
      p.x=nx; p.y=ny; const a=[...pts.values()];
      const d=dist(a[0].x,a[0].y,a[1].x,a[1].y);
      if(pinch0>0) MAPV.z=clamp(z0*d/pinch0,1,5);
    } else if(pts.size===1 && MAPV.z>1.01){
      const sc=(Math.min(el.width,el.height)*0.94/WORLD)*MAPV.z;
      MAPV.cx-=dx/sc; MAPV.cy-=dy/sc; p.x=nx; p.y=ny;
    }
  });
  const up=e=>{
    if(pts.has(e.pointerId) && pts.size===1 && moved<12*DPR && G && MAPV.toWorld){
      const now=performance.now();
      if(now-lastTap<320){ MAPV.z=1; MAPV.cx=WORLD/2; MAPV.cy=WORLD/2; lastTap=0; if(G)G.courseTgt=null; }  // double-tap reset
      else {
        lastTap=now;
        const wpt=MAPV.toWorld(e.offsetX*DPR,e.offsetY*DPR);
        if(wpt.x>0&&wpt.x<WORLD&&wpt.y>0&&wpt.y<WORLD){
          G.courseTgt={x:wpt.x,y:wpt.y}; say("En route vers le point désigné.","cmd");
        }
      }
    }
    pts.delete(e.pointerId);
  };
  el.addEventListener("pointerup",up); el.addEventListener("pointercancel",up);
}
/* ---------- touch input : periscope (drag to train, tap ship to lock TDC) ---------- */
{
  const el=$("#cvPeri"); let pid=null, lx=0, moved=0;
  el.style.touchAction="none";
  el.addEventListener("pointerdown",e=>{ pid=e.pointerId; lx=e.offsetX*DPR; moved=0; });
  el.addEventListener("pointermove",e=>{
    if(e.pointerId!==pid||!G) return;
    const nx=e.offsetX*DPR, dx=nx-lx; lx=nx; moved+=Math.abs(dx);
    const FOV=42*D2R;
    G.sub.scopeRel=norm(G.sub.scopeRel + dx/(el.width*0.5)*FOV);   // drag pans the scope
  });
  const up=e=>{
    if(e.pointerId===pid && moved<10*DPR && G){
      // a tap: lock the ship nearest the touch (from the last rendered frame)
      const s=G.sub, drawn=G.lastDrawn||[], FOV=42*D2R, half=el.width*0.5;
      let best=null,bd=60*DPR;
      for(const o of drawn){ const px=half+(o.rel/FOV)*half;
        const d=Math.abs(px-e.offsetX*DPR); if(d<bd){ bd=d; best=o.c; } }

}

function loadedTubes(){ return G.sub.tubes.filter(t=>t.loaded).length; }

function launchTorp(aim){

                fault, premAt:500+Math.random()*1600});

}
function firingAim(){
  const s=G.sub, t=s.tdc;
  if(t.on && t.valid) return s.hdg + t.gyro;   // TDC computes a gyro angle (lead)
  return s.hdg;                                 // otherwise straight down the bow axis
}
function fireOne(){
  audio(); const s=G.sub;
  if(s.depth>20){ say("Lancement impossible : remonte sous 20 m.","cmd"); return; }
  const tube=s.tubes.find(t=>t.loaded);
  if(!tube){ say("Tous les tubes sont vides.","cmd"); return; }
  launchTorp(firingAim());
  tube.loaded=false; startReload(tube);
  say("Torpille lancée !"+(s.tdc.on&&s.tdc.valid?" (solution TDC)":""),"alarm"); launchSfx();

}
function fireSalvo(){
  audio(); const s=G.sub;
  if(s.depth>20){ say("Lancement impossible : remonte sous 20 m.","cmd"); return; }
  const ready=s.tubes.filter(t=>t.loaded);
  if(!ready.length){ say("Tous les tubes sont vides.","cmd"); return; }
  const base=firingAim(), n=ready.length;
  ready.forEach((tube,i)=>{
    const spread=(i-(n-1)/2)*0.018;            // small fan
    launchTorp(base+spread); tube.loaded=false; startReload(tube);
  });
  say("SALVE de "+n+" torpilles !","alarm"); launchSfx();
  updateFireBtn();
}
function startReload(tube){
  if(G.sub.reserve>0){ G.sub.reserve--; tube.rt=24; } else { tube.rt=0; } // no reload if reserve empty
}
function updateTDC(dt){
  const s=G.sub, t=s.tdc;
  if(!t.on || !t.tgt || !t.tgt.alive){ t.valid=false; if(t.on&&t.tgt&&!t.tgt.alive){t.on=false;t.tgt=null;} return; }
  const c=t.tgt;
  t.brg=angTo(s.x,s.y,c.x,c.y); t.rng=dist(s.x,s.y,c.x,c.y);
  t.crs=c.hdg; t.spd=c.spd;
  // intercept solution: aim so torpedo (speed St) meets target moving at Vt
  const St=TORP_SPD;
  const Rx=c.x-s.x, Ry=c.y-s.y;
  const Vx=Math.cos(c.hdg)*c.spd*KN, Vy=Math.sin(c.hdg)*c.spd*KN;
  const a=Vx*Vx+Vy*Vy-St*St, b=2*(Rx*Vx+Ry*Vy), cc=Rx*Rx+Ry*Ry;
  let tau=-1;
  if(Math.abs(a)<1e-4){ if(Math.abs(b)>1e-4) tau=-cc/b; }
  else { const disc=b*b-4*a*cc; if(disc>=0){ const sq=Math.sqrt(disc);
    const t1=(-b+sq)/(2*a), t2=(-b-sq)/(2*a);
    tau=Math.min(...[t1,t2].filter(x=>x>0)); if(!isFinite(tau)) tau=-1; } }
  if(tau>0){
    const aimX=Rx+Vx*tau, aimY=Ry+Vy*tau;
    const aim=Math.atan2(aimY,aimX);
    t.gyro=norm(aim-s.hdg);
    t.valid = t.rng<TORP_RANGE && Math.abs(t.gyro)<=100*D2R;
  } else { t.valid=false; }
}

function toggleTDC(){
  const s=G.sub, t=s.tdc;
  if(t.on){ t.on=false; t.tgt=null; t.valid=false; say("TDC désengagé.","cmd"); return; }
  if(!(s.periUp && s.peri>0.7 && s.depth<=PERISCOPE_DEPTH)){ say("Périscope requis pour acquérir.","cmd"); return; }
  // find a visible target nearest the crosshair (scope bearing)
  const visR=currentVisRange(); let best=null,br=0.2;
  for(const c of G.contacts){ if(!c.alive)continue;
    const rel=Math.abs(norm(angTo(s.x,s.y,c.x,c.y)-s.scope)), dM=dist(s.x,s.y,c.x,c.y);
    if(dM>visR) continue; if(rel<br){ br=rel; best=c; } }
  if(!best){ say("Aucune cible dans le réticule.","cmd"); return; }
  t.on=true; t.tgt=best; say("TDC : cible acquise.","cmd");
}

/* ---------- simulation ---------- */
function step(dt){
  const s=G.sub;
  G.t+=dt;
  G.env.clock += dt/600;                  // a sim-hour every ~10 min of play (dusk creeps in)

  // periscope bearing — rotates with hull but can be slewed independently of course
  s.scopeRel=norm(s.scopeRel + G.scopeRot*1.1*dt);
  s.scope=norm(s.hdg + s.scopeRel);

  // rudder & heading — slow, deliberate turning
  s.rudder=clamp(s.rudder + rud*dt*0.5 - (rud===0? Math.sign(s.rudder)*Math.min(Math.abs(s.rudder),dt*0.6):0), -1,1);
  const surfaced=s.depth<4;
  // battery : electric motors drain submerged; diesels recharge on the surface
  if(surfaced){ s.batt=clamp(s.batt+0.6*dt,0,100); }
  else { s.batt=clamp(s.batt-(0.025+s.vel*0.0175)*dt,0,100); }
  if(!surfaced && s.batt<=1){ if(s.spd>1){ s.spd=1; syncSpeedBtns(); }
    sayOnce("batt","Batterie à plat — vitesse réduite. Faire surface aux diesels.","alarm"); }
  else if(s.batt>15){ saidOnce.batt=0; }
  const speedKn=SPEEDS[s.spd]*(surfaced?1.7:1);      // diesels run faster on the surface
  s.vel += (speedKn - s.vel)*Math.min(1,dt*0.5);     // inertia
  if(G.courseTgt){                                   // tap-set course: helm steers for you
    const want=angTo(s.x,s.y,G.courseTgt.x,G.courseTgt.y);
    const da=norm(want-s.hdg);
    s.rudder=clamp(da*2,-1,1);
    if(dist(s.x,s.y,G.courseTgt.x,G.courseTgt.y)<120){ G.courseTgt=null; s.rudder=0; say("Point de route atteint.","cmd"); }
  }
  s.hdg = norm(s.hdg + s.rudder*0.05*dt*(0.4+s.vel/6));

  // move (meters)
  const v=s.vel*KN;
  const nx=clamp(s.x+Math.cos(s.hdg)*v*dt,40,WORLD-40);
  const ny=clamp(s.y+Math.sin(s.hdg)*v*dt,40,WORLD-40);
  if(landAt(nx,ny)){ s.vel*=0.1; sayOnce("ground","Bas-fond ! Échouement, on stoppe !","alarm"); }
  else { s.x=nx; s.y=ny; saidOnce.ground=0; }

  // depth toward target — slow, realistic flooding / blowing rates
  const dd=s.tDepth-s.depth;
  if(s.crashT>0) s.crashT-=dt;
  if(s.blowT>0)  s.blowT-=dt;
  s.pitch = clamp(s.pitch + (clamp(dd*0.05,-1,1)-s.pitch)*dt*2, -1,1);
  const drate = dd>0 ? (s.crashT>0?1.7:0.85)             // diving is slow & deliberate (crash-dive faster)
                     : (s.blowT>0?4.8:3.3);              // blowing tanks lifts fast (escape)
  s.depth += Math.sign(dd)*Math.min(Math.abs(dd),drate*dt) + s.leak*0.7*dt;

  // seabed: you cannot pass the bottom, but you may leave it freely
  const seabed=seabedAt(s.x,s.y);
  if(s.depth > seabed){                                    // clamp only when pushing INTO the bottom
    if(dd>0 && s.vel>2 && (s.depthPrev||s.depth) < seabed-2) s.hull-=3;   // grounded hard while diving
    s.depth=seabed;
  }
  s.onBottom = (s.depth >= seabed-0.4);
  if(s.onBottom) sayOnce("bottom","Posé sur le fond.","cmd"); else saidOnce.bottom=0;
  s.depth=clamp(s.depth,0,MAXDEPTH); s.depthPrev=s.depth;
  // ballast tanks: flood to dive, blow to surface, neutral when holding
  const bTarget = (s.tDepth>s.depth+1)?90 : (s.tDepth<s.depth-1)?8 : 50;
  s.ballast += (bTarget - s.ballast)*Math.min(1,dt*1.0);

  // crush-depth stress past the rated 210 m — descend deeper at your peril
  if(s.depth>CRUSH){
    const over=s.depth-CRUSH;                        // metres past the limit
    s.stress=(s.stress||0)+over*dt;
    s.hull -= (0.4+over*0.06)*dt;                    // continuous hull loss
    sayOnce("crush","Cote d'écrasement dépassée — la coque gémit dangereusement !","alarm");
    G.creakT=(G.creakT||0)-dt; if(G.creakT<=0){ creak(); G.creakT=1.6+Math.random()*2.2; }
    if(Math.random() < clamp(over*0.006,0,0.3)*dt){  // pressure incident
      if(Math.random()<0.5){ s.leak=clamp(s.leak+1,0,3); say("La pression force une voie d'eau !","alarm"); }
      else { s.fire=clamp(s.fire+0.8,0,2); say("Court-circuit sous la pression !","alarm"); }
      // (incident sous pression : le craquement est déjà joué)
    }
    if(Math.random() < Math.max(0,over-20)*0.0012*(1+s.stress/150)*dt){
      boom(); vibrate([0,400,80,300]); lose("Implosion. La coque a cédé sous la pression."); 
    }
  } else { s.stress=Math.max(0,(s.stress||0)-dt*4); saidOnce.crush=0; }

  // periscope mast
  s.peri += ((s.periUp && s.depth<=PERISCOPE_DEPTH?1:0)-s.peri)*Math.min(1,dt*2.5);
  if(s.periUp && s.depth>PERISCOPE_DEPTH){ s.periUp=false; $("#bPeri").classList.remove("on"); $("#bPeri").textContent="Périscope ▲"; }

  // tube reloading
  for(const tube of s.tubes){
    if(!tube.loaded && tube.rt>0){ tube.rt-=dt; if(tube.rt<=0){ tube.loaded=true; updateFireBtn(); say("Tube rechargé.","cmd"); } }
  }
  // TDC : track the locked target, compute intercept (gyro) solution
  updateTDC(dt);

  // leak: takes on water -> slow sink + hull stress; auto-stabilises slowly if shallow & slow
  if(s.leak>0){
    s.leak=clamp(s.leak - dt*0.04,0,3);          // crew patches slowly
    s.hull-=s.leak*dt*0.5;
  }
  // fire
  if(s.fire>0){
    s.fire=clamp(s.fire-dt*0.10,0,2); s.hull-=s.fire*dt*0.6;
    if(s.fire<=0) say("Incendie maîtrisé.","cmd");
  }

  // ---- torpedoes ----
  for(const t of G.torps){
    t.run+=TORP_SPD*dt;
    t.x+=Math.cos(t.hdg)*TORP_SPD*dt; t.y+=Math.sin(t.hdg)*TORP_SPD*dt;
    if(t.fault==="premature" && t.run>t.premAt){     // magnetic-pistol premature
      t.dead=true; boom(); G.explosions.push({x:t.x,y:t.y,life:1.4,max:1.4});
      say("Torpille : explosion prématurée (amorce magnétique).","alarm"); continue;
    }
    for(const c of G.contacts){
      if(!c.alive) continue;
      if(dist(t.x,t.y,c.x,c.y)<80){
        t.dead=true;
        if(t.fault==="dud"){ say("Torpille au but — RATÉ ! Percuteur défectueux.","alarm"); break; }
        G.hits++; sinkShip(c);
        break;
      }
    }
    if(t.run>TORP_RANGE || t.x<0||t.y<0||t.x>WORLD||t.y>WORLD) t.dead=true;
  }
  G.torps=G.torps.filter(t=>!t.dead);

  // convoy zigzag plan (throws off the firing solution)
  G.zigT-=dt; if(G.zigT<=0){ G.zigDir*=-1; G.zig=G.zigDir*0.34; G.zigT=16+Math.random()*16; }
  const convoyHdg=norm(G.convoyBase+G.zig);

  // ---- contacts AI ----
  for(const c of G.contacts){
    if(!c.alive) continue;
    if(c.type==="cargo"){
      c.hdg=norm(c.hdg+clamp(norm(convoyHdg-c.hdg),-0.4*dt,0.4*dt));   // steer onto the zigzag leg
      avoidHazards(c,dt);
      const cnx=c.x+Math.cos(c.hdg)*c.spd*KN*dt, cny=c.y+Math.sin(c.hdg)*c.spd*KN*dt;
      if(!landAt(cnx,cny)){ c.x=cnx; c.y=cny; } else { c.hdg=norm(c.hdg+0.5); }
      if(c.x<60||c.x>WORLD-60||c.y<60||c.y>WORLD-60){ c.fled=true; c.alive=false; G.escaped++; }
    } else {
      escortAI(c,dt);
    }
  }
  updatePlanes(dt);
  updateHydrophone(dt);

  // mines : moored mid-water — contact while shallow enough
  if(s.depth<70){
    for(const mn of G.mines){
      if(!mn.live) continue;
      if(dist(s.x,s.y,mn.x,mn.y)<45){
        mn.live=false; boom(); flashScreen(); vibrate([0,200,60,140]); creak();
        G.explosions.push({x:s.x,y:s.y,life:1.8,max:1.8}); G.booms.push({x:s.x,y:s.y,life:.5});
        s.hull-=46; s.leak=clamp(s.leak+1.4,0,3);
        say("MINE ! Explosion contre la coque — voie d'eau !","alarm");
      }
    }
  }

  // radio intelligence drops
  G.radioT-=dt; if(G.radioT<=0){ radioReport(); G.radioT=85+Math.random()*75; }

  // visual confirmation: mark contacts "seen" when in visual range & in view
  const visR=currentVisRange(), surf=s.depth<4, scopeOK=s.peri>0.8 && s.depth<=PERISCOPE_DEPTH;
  if(surf||scopeOK){
    for(const c of G.contacts){
      if(!c.alive) continue;
      const dM=dist(s.x,s.y,c.x,c.y);
      if(dM>visR) continue;
      let inView = surf ? true : Math.abs(norm(angTo(s.x,s.y,c.x,c.y)-s.scope))<0.62;
      if(inView) c.seen=G.t;
    }
  }

  // ---- continuous patrol : engage -> disperse -> transit (repairs) -> next ----
  if(G.phase==="attack" && !G.over){
    if(G.scenario.duel){
      if(!G.contacts.some(c=>c.type==="escort"&&c.alive)) disperseConvoy(true);
    } else {
      const reachable=G.contacts.some(c=>c.type==="cargo"&&c.alive);
      if(!reachable) disperseConvoy(G.merchSunk>=G.need);
    }
  }
  if(G.phase==="transit" && !G.over){
    G.nextConvoyT-=dt;
    // crew repairs the boat while not under fire
    if(G.det<25 && s.leak<=0 && s.fire<=0 && s.hull<100) s.hull=clamp(s.hull+0.3*dt,0,100);
    if(G.nextConvoyT<=0) nextConvoy();
  }

  // ---- detection accumulation (from living escorts) ----
  const light=todInfo(G.env.clock).light;
  let detRate=-1.2; // passive decay baseline
  let nearestEnemy=1e9;
  for(const c of G.contacts){
    if(!c.alive||c.type!=="escort") continue;
    const dM=dist(s.x,s.y,c.x,c.y); nearestEnemy=Math.min(nearestEnemy,dM);
    const near=clamp(1-dM/2600,0,1);
    if(near<=0) continue;
    // noise floor is dominated by speed; rigging for silent running cuts it drastically
    let noise = s.silent ? (0.10 + s.vel*0.45 + s.peri*0.8)
                         : (0.30 + s.vel*0.80 + s.peri*1.0);
    if(s.depth<4) noise += 2.6*(0.3+0.7*light);     // surfaced: spotted by day, less at night
    noise += (s.detSpike>0?2.4:0) + s.leak*0.5 + s.fire*0.4;
    const depthHide=clamp(s.depth/60,0,1)*0.6;
    detRate=Math.max(detRate, near*(noise-depthHide)*2.4 - 0.8);
  }
  if(s.detSpike>0) s.detSpike=Math.max(0,s.detSpike-dt*1);
  if(s.onBottom && s.vel<1.2) detRate-=1.4;          // lying doggo on the seabed
  // "silence total" : silent + stopped + no recent noise → the boat all but vanishes
  G.totalSilence = s.silent && s.vel<0.4 && (s.detSpike||0)<=0 && s.depth>=4;
  if(G.totalSilence){ detRate-=1.6; sayOnce("siltot","SILENCE TOTAL — moteurs stoppés, équipage figé.","cmd"); }
  else saidOnce.siltot=0;
  G.det=clamp(G.det+detRate*dt,0,100);
  // ---- audio ambience ----
  engineSet(s.vel, s.depth<4);
  if(G.det>=72){ G.hbT=(G.hbT||0)-dt; if(G.hbT<=0){ heartbeat(); G.hbT=clamp(1.5-G.det*0.007,0.5,1.4); } }

  // ---- sonar ping cadence : always leave silence between pings so they never blur into one ----
  G.pingT-=dt;
  if(G.pingT<=0 && nearestEnemy<3000){
    const f=clamp(1-nearestEnemy/3000,0,1);
    const dur=(SND.sonar&&SND.sonar.duration)||1.4;   // let the sample finish first
    const silence=0.3+(1-f)*2.3;                       // closer → shorter silence, but never zero
    G.pingT = dur + silence;
    ping(560+f*420, .07+f*.12);
  }

  // ---- depth charges damage ----
  G.booms=G.booms.filter(b=>{ b.life-=dt; return b.life>0; });
  G.explosions=G.explosions.filter(e=>{ e.life-=dt; return e.life>0; });
  G.wrecks=G.wrecks.filter(w=>{ w.life-=dt; return w.life>0; });
  G.pings=G.pings.filter(p=>{ p.life-=dt; return p.life>0; });
  if(G.gunT>0) G.gunT-=dt;
  if(tutoStep>=0 && TUTO[tutoStep].done()) tutoAdvance();
  G.decoys=(G.decoys||[]).filter(d=>{ d.t-=dt; return d.t>0; });

  // hull / lose
  s.hull=clamp(s.hull,0,100);
  if(s.hull<=0 && !G.over) lose("La coque cède. Le U-Boot sombre corps et biens.");
}

let detLockSaid=false;
function escortAI(c,dt){
  const s=G.sub;
  if(G.det>=70){ c.state="hunt"; }
  else if(G.det<25 && c.state==="hunt"){ c.state="patrol"; }

  c.fixT=(c.fixT||0)-dt;                 // periodic fix, no continuous jitter
  let tx,ty,spd,turn;
  if(c.state==="hunt"){
    if(!detLockSaid){ detLockSaid=true; sayOnce("lock","Ils nous ont repérés ! L'escorte fait route sur nous !","alarm"); }
    const dec=activeDecoy();
    if(c.fixT<=0){
      if(dec){ c.lkx=dec.x+(Math.random()-.5)*90; c.lky=dec.y+(Math.random()-.5)*90; c.fixT=3.5; }  // fooled by the bubbles
      else { const fuzz=(1-G.det/100)*700+120;
        c.lkx=clamp(s.x+(Math.random()-.5)*fuzz,40,WORLD-40);
        c.lky=clamp(s.y+(Math.random()-.5)*fuzz,40,WORLD-40); c.fixT=3.5; }
    }
    tx=c.lkx; ty=c.lky; spd=11; turn=0.10;
    const dM=dist(c.x,c.y,s.x,s.y);
    // active Asdic: periodic ping; refines fix & spikes detection when in range & above the layer
    c.asdicT=(c.asdicT||0)-dt;
    if(dM<2400 && c.asdicT<=0){
      c.asdicT=4.0; ping(900,.10);
      G.pings.push({x:c.x,y:c.y,life:1.1,max:1.1});
      if(dec && dist(c.x,c.y,dec.x,dec.y)<2400){
        c.lkx=dec.x; c.lky=dec.y; c.fixT=4;                     // the echo returns the decoy, not us
        G.det=clamp(G.det-2.5,0,100);
      } else {
        const layer = s.depth>130 ? 0.3 : (s.depth<14?0.6:1);   // deep dive (below layer) or surface duct defeats it
        const stillness = 0.45+0.55*clamp(s.vel/3,0,1);          // a stopped boat is harder to pick out from the seabed
        const ret = clamp(1-dM/2400,0,1)*layer*stillness;
        if(ret>0.25){ c.lkx=s.x+(Math.random()-.5)*120; c.lky=s.y+(Math.random()-.5)*120; c.fixT=4;
          G.det=clamp(G.det+ret*22,0,100); }
      }
    }
    c.dcT-=dt;
    if(dM<340 && c.dcT<=0){ c.dcT=3.0; dropCharges(c); }
  } else {
    detLockSaid=false;
    if(G.scenario.duel){
      // lone hunter: creeping expanding search around the last datum, pinging to re-acquire
      if(c.fixT<=0){ const r=350+Math.random()*1000, a=Math.random()*TAU;
        c.px=clamp((c.lkx||s.x)+Math.cos(a)*r,40,WORLD-40);
        c.py=clamp((c.lky||s.y)+Math.sin(a)*r,40,WORLD-40); c.fixT=5; }
      tx=c.px; ty=c.py; spd=7; turn=0.07;
      const dM=dist(c.x,c.y,s.x,s.y);
      c.asdicT=(c.asdicT||0)-dt;
      if(dM<2400 && c.asdicT<=0){ c.asdicT=4.5; ping(900,.09); G.pings.push({x:c.x,y:c.y,life:1.1,max:1.1});
        const dec=activeDecoy();
        if(dec && dist(c.x,c.y,dec.x,dec.y)<2400){ c.lkx=dec.x; c.lky=dec.y; }
        else { const layer=s.depth>130?0.3:(s.depth<14?0.6:1), still=0.45+0.55*clamp(s.vel/3,0,1);
          const ret=clamp(1-dM/2400,0,1)*layer*still;
          if(ret>0.30){ G.det=clamp(G.det+ret*16,0,100); c.lkx=s.x; c.lky=s.y; } } }
    } else if(c.fixT<=0){
      const merch=G.contacts.filter(k=>k.type==="cargo"&&k.alive);
      if(merch.length){
        const mx=merch.reduce((a,k)=>a+k.x,0)/merch.length;
        const my=merch.reduce((a,k)=>a+k.y,0)/merch.length;
        c.px=clamp(mx+(Math.random()-.5)*1100,40,WORLD-40);
        c.py=clamp(my+200+Math.random()*400,40,WORLD-40); c.fixT=5; }   // screen ahead of convoy
      else { c.px=clamp(WORLD*0.5+(Math.random()-.5)*WORLD*0.5,40,WORLD-40);
             c.py=clamp(WORLD*0.5+(Math.random()-.5)*WORLD*0.5,40,WORLD-40); c.fixT=7; }
    }
    if(!G.scenario.duel){ tx=c.px||WORLD*0.5; ty=c.py||WORLD*0.4; spd=6; turn=0.06; }
  }
  // steer with a limited turn rate — a ship cannot pivot on the spot
  const da=norm(angTo(c.x,c.y,tx,ty)-c.hdg);
  c.hdg=norm(c.hdg+clamp(da,-turn*dt,turn*dt));
  avoidHazards(c,dt);
  const enx=clamp(c.x+Math.cos(c.hdg)*spd*KN*dt,20,WORLD-20);
  const eny=clamp(c.y+Math.sin(c.hdg)*spd*KN*dt,20,WORLD-20);
  if(!landAt(enx,eny)){ c.x=enx; c.y=eny; } else { c.hdg=norm(c.hdg+1.0); c.fixT=0; }
}
function avoidHazards(c,dt){
  // convoys skirt a known minefield; shoals/reefs are passable to surface ships
  const z=G.mineZone; if(!z) return;
  const d=dist(c.x,c.y,z.x,z.y);
  if(d < z.r+300){ const away=angTo(z.x,z.y,c.x,c.y);
    c.hdg=norm(c.hdg + clamp(norm(away-c.hdg),-0.7*dt,0.7*dt)); }
}
function dropCharges(c){
  boom();
  const s=G.sub;
  const dM=dist(c.x,c.y,s.x,s.y);
  G.booms.push({x:c.x,y:c.y,life:.5,r:1});
  // closer + shallower = more damage; deep diving helps
  const prox=clamp(1-dM/360,0,1);
  const depthFactor=clamp(1-s.depth/140,0.15,1);   // shallow = worse
  const dmg=prox*depthFactor*42;
  if(dmg>2){
    s.hull-=dmg;
    vibrate(clamp(Math.round(dmg*4),40,300)); if(dmg>18) creak();
    say("Grenades sous-marines ! Secousse violente !","alarm");
    // chance of incident
    const roll=Math.random();
    if(dmg>22 && roll<0.5){ s.leak=clamp(s.leak+1.2,0,3); say("Voie d'eau ! On embarque de l'eau !","alarm"); }
    else if(dmg>16 && roll<0.75){ s.fire=clamp(s.fire+1,0,2); say("Départ de feu au compartiment moteur !","alarm"); }
  }
}

const saidOnce={};
function sayOnce(key,txt,cls){ if(saidOnce[key])return; saidOnce[key]=1; say(txt,cls); }

function logSink(label,tons,x,y){
  if(!G.ktb) G.ktb=[];
  const c=G.env.clock;
  G.ktb.push({day:Math.floor(c/24)+1, hour:Math.round(((c%24)+24)%24), grid:grid(x,y), label, tons});
}
function creditTons(tons){
  G.patrolTons += tons;
  const car=loadCareer(); car.tonnage += tons; saveCareer(car);
}
function shipLabel(c){ return c.type==="escort" ? "Escorte" : (c.kind==="tanker" ? "Pétrolier" : "Cargo"); }
function sinkShip(c){
  c.alive=false; boom(); flashScreen(); vibrate([0,140,40,90]);
  const big = c.kind==="tanker";
  if(big){ setTimeout(boom,350); }                          // fuel goes up in a second blast
  G.explosions.push({x:c.x,y:c.y,life:big?4:2.6,max:big?4:2.6});
  G.wrecks.push({x:c.x,y:c.y,life:big?12:7});
  if(c.type==="cargo"){ onMerchantSunk(c); }
  else { creditTons(c.tons||1300); logSink("Escorte",c.tons||1300,c.x,c.y); say("Escorte coulée !","alarm"); }
}
function onMerchantSunk(c){
  if(G.over) return;
  const tank = c&&c.kind==="tanker";
  G.merchSunk++; creditTons((c&&c.tons)||7000); logSink(tank?"Pétrolier":"Cargo",(c&&c.tons)||7000,c.x,c.y);
  say(tank?`TOUCHÉ ! Pétrolier en flammes (${G.merchSunk}/${G.need}) !`
          :`TOUCHÉ ! Liberty ship coulé (${G.merchSunk}/${G.need}).`,"alarm");
  if(G.merchSunk>=G.need) disperseConvoy(true);
}
function disperseConvoy(success){
  if(G.phase!=="attack") return;
  G.phase="transit"; G.nextConvoyT=45+Math.random()*40;
  say(success ? "Convoi dispersé ! Reprise de patrouille — réparations en cours."
              : "Le convoi s'est échappé. On poursuit la patrouille.","cmd");
}
function nextConvoy(){
  G.contacts=[]; G.sound=[]; G.intel=[]; G.det=Math.min(G.det,12);
  G.merchSunk=0; G.convoyNum=(G.convoyNum||1)+1; G.phase="attack";
  spawnConvoy(G.scenario);
  if(G.scenario.duel){ G.det=Math.max(G.det,42); say("Un nouveau destroyer fait route sur vous.","alarm"); }
  else { radioReport(); say("Veille renforcée : un nouveau convoi serait dans le secteur.","cmd"); }
}
function flashScreen(){
  const f=$("#flash"); if(!f) return;
  f.style.transition="none"; f.style.opacity="0.9";
  requestAnimationFrame(()=>{ f.style.transition="opacity .7s ease-out"; f.style.opacity="0"; });
}
function win(){ if(G.over)return; G.over=true; G.won=true; G.running=false; showEnd(true); }
function lose(reason){ if(G.over)return; G.over=true; G.won=false; G.running=false; G.loseReason=reason; showEnd(false); }
function returnToBase(){
  if(!G || G.over) return;
  const car=loadCareer(); car.patrols++; saveCareer(car);   // tonnage already credited per sinking
  win();
}

/* ---------- rendering: cockpit ---------- */
const cvC=$("#cvCock"), cxC=cvC.getContext("2d");
const cvM=$("#cvMap"), cxM=cvM.getContext("2d");
const cvP=$("#cvPeri"), cxP=cvP.getContext("2d");
let DPR=Math.min(devicePixelRatio||1,2);
function resize(){
  for(const cv of [cvC,cvM,cvP]){
    const r=cv.getBoundingClientRect();
    cv.width=Math.max(1,r.width*DPR); cv.height=Math.max(1,r.height*DPR);
  }
}
addEventListener("resize",resize);

function drawCockpit(){
  const w=cvC.width,h=cvC.height,cx=cxC,s=G.sub;
  cx.clearRect(0,0,w,h);
  // bg: water gradient by depth
  const g=cx.createLinearGradient(0,0,0,h);
  const dk=clamp(s.depth/CRUSH,0,1);
  g.addColorStop(0,`rgb(${10-6*dk},${28-18*dk},${34-22*dk})`);
  g.addColorStop(1,`rgb(${4},${10-6*dk},${14-9*dk})`);
  cx.fillStyle=g; cx.fillRect(0,0,w,h);

  const u=w/100;                 // unit scale to width
  cx.save();
  cx.translate(w*0.5,h*0.52);
  cx.rotate(s.pitch*0.22);

  // --- Type VII U-boat silhouette (side view, bow to the right) ---
  const L=70*u, H=11*u;
  cx.lineJoin="round";
  cx.fillStyle="#2a322c"; cx.strokeStyle="#0a0d0b"; cx.lineWidth=2*DPR;
  // pressure hull + casing: long low body, raised pointed bow, tapered stern
  cx.beginPath();
  cx.moveTo(-L*0.50,  H*0.20);                       // stern tip
  cx.lineTo(-L*0.46, -H*0.30);
  cx.lineTo(-L*0.10, -H*0.55);                        // casing toward tower
  cx.lineTo( L*0.18, -H*0.55);
  cx.lineTo( L*0.42, -H*0.32);                        // bow rise
  cx.lineTo( L*0.52, -H*0.05);                        // net-cutter bow point
  cx.lineTo( L*0.40,  H*0.30);
  cx.lineTo(-L*0.40,  H*0.55);                        // keel
  cx.closePath(); cx.fill(); cx.stroke();
  // saddle-tank bulge along the waterline
  cx.fillStyle="#222a24";
  cx.beginPath(); cx.moveTo(-L*0.40,H*0.18); cx.quadraticCurveTo(0,H*0.62,L*0.36,H*0.18);
  cx.lineTo(L*0.34,H*0.40); cx.quadraticCurveTo(0,H*0.78,-L*0.38,H*0.40); cx.closePath(); cx.fill();
  // deck line
  cx.strokeStyle="#3c463d"; cx.lineWidth=1.4*DPR;
  cx.beginPath(); cx.moveTo(-L*0.44,-H*0.30); cx.lineTo(L*0.30,-H*0.45); cx.stroke();
  // deck gun (forward)
  cx.strokeStyle="#1a201c"; cx.lineWidth=2*DPR;
  cx.beginPath(); cx.moveTo(L*0.20,-H*0.55); cx.lineTo(L*0.30,-H*0.95); cx.stroke();
  // conning tower: stepped bridge + Wintergarten (flak platform aft)
  cx.fillStyle="#222a24"; cx.strokeStyle="#0a0d0b"; cx.lineWidth=2*DPR;
  cx.beginPath();
  cx.moveTo(-9*u,-H*0.55); cx.lineTo(-9.5*u,-H*0.55-9*u); cx.lineTo(-1*u,-H*0.55-11*u);
  cx.lineTo( 7*u,-H*0.55-11*u); cx.lineTo( 8*u,-H*0.55-7*u); cx.lineTo( 9*u,-H*0.55);
  cx.closePath(); cx.fill(); cx.stroke();
  // Wintergarten rail (aft of tower)
  cx.strokeStyle="#3c463d"; cx.lineWidth=1.2*DPR;
  cx.beginPath(); cx.moveTo(-9.5*u,-H*0.55-9*u); cx.lineTo(-13*u,-H*0.55-6*u); cx.lineTo(-13*u,-H*0.55); cx.stroke();
  // periscope shears + mast
  const pml=s.peri*13*u, mx=2*u;
  cx.strokeStyle="#c9a24b"; cx.lineWidth=2.4*DPR;
  if(pml>0.5){ cx.beginPath(); cx.moveTo(mx,-H*0.55-11*u); cx.lineTo(mx,-H*0.55-11*u-pml); cx.stroke();
    cx.fillStyle="#c9a24b"; cx.fillRect(mx-2.2*DPR,-H*0.55-11*u-pml-3*DPR,9*DPR,3*DPR); }

  // --- ballast saddle tanks fill/blow (the bulge fills with water) ---
  const fill=clamp(s.ballast/100,0,1);
  for(const tx of [-L*0.26,-L*0.02,L*0.22]){
    const tw=13*u,th=5*u, ty=H*0.16;
    cx.strokeStyle="#0a0d0b"; cx.lineWidth=1.4*DPR; cx.strokeRect(tx-tw/2,ty,tw,th);
    cx.fillStyle="rgba(60,150,180,.55)";
    cx.fillRect(tx-tw/2+1, ty+th*(1-fill)+1, tw-2, th*fill-2);
  }

  // --- incident lights on tower ---
  drawLamp(cx,-4*u,-H*0.55-5*u,"FEU",s.fire>0);
  drawLamp(cx,0,-H*0.55-5*u,"EAU",s.leak>0);
  drawLamp(cx,4*u,-H*0.55-5*u,"AVARIE",s.hull<45);

  // torpedo wake from bow when recently fired
  cx.restore();

  // depth ladder (left)
  drawDepthGauge(cx,w,h,s);
  // inclinometer (right)
  drawIncl(cx,w,h,s);

  // bubbles rising if blowing ballast (surfacing)
  if(s.tDepth<s.depth-1){
    cx.fillStyle="rgba(180,220,235,.25)";
    for(let i=0;i<10;i++){ const bx=w*0.5+Math.sin(G.t*2+i)*40*DPR;
      const by=(h*0.55 - ((G.t*60+i*40)%(h*0.5)));
      cx.beginPath(); cx.arc(bx,by,2*DPR,0,TAU); cx.fill(); }
  }
}
function drawLamp(cx,x,y,label,on){
  cx.beginPath(); cx.arc(x,y,2.6*DPR,0,TAU);
  cx.fillStyle= on? "#e0533a":"#241a17";
  cx.shadowColor= on?"#e0533a":"transparent"; cx.shadowBlur= on?10:0;
  cx.fill(); cx.shadowBlur=0;
}
function drawDepthGauge(cx,w,h,s){
  const x=18*DPR, top=h*0.14, bot=h*0.86, span=bot-top, MX=MAXDEPTH;
  // crush zone (210..300) in red
  const yc=top+span*(CRUSH/MX);
  cx.fillStyle="rgba(224,83,58,.12)"; cx.fillRect(x-2*DPR,yc,18*DPR,bot-yc);
  cx.strokeStyle="rgba(224,83,58,.6)"; cx.lineWidth=1*DPR;
  cx.beginPath(); cx.moveTo(x-2*DPR,yc); cx.lineTo(x+16*DPR,yc); cx.stroke();
  cx.strokeStyle="#3c463d"; cx.lineWidth=2*DPR;
  cx.beginPath(); cx.moveTo(x,top); cx.lineTo(x,bot); cx.stroke();
  cx.fillStyle="#7d8a7c"; cx.font=`${10*DPR}px monospace`; cx.textAlign="left";
  for(let d=0; d<=MX; d+=50){
    const y=top+span*(d/MX);
    cx.beginPath(); cx.moveTo(x,y); cx.lineTo(x+7*DPR,y); cx.stroke();
    cx.fillText(d+"", x+10*DPR, y+3*DPR);
  }
  const y=top+span*clamp(s.depth/MX,0,1);
  cx.fillStyle= s.depth>CRUSH?"#e0533a":"#e8b94a";
  cx.beginPath(); cx.moveTo(x-3*DPR,y); cx.lineTo(x+14*DPR,y-4*DPR); cx.lineTo(x+14*DPR,y+4*DPR); cx.fill();
  const yt=top+span*clamp(s.tDepth/MX,0,1);
  cx.strokeStyle="#5ff08a"; cx.lineWidth=1.5*DPR;
  cx.beginPath(); cx.moveTo(x-2*DPR,yt); cx.lineTo(x+16*DPR,yt); cx.stroke();
}
function drawIncl(cx,w,h,s){
  const cxp=w-46*DPR, cyp=h*0.2, r=26*DPR;
  cx.strokeStyle="#3c463d"; cx.lineWidth=2*DPR;
  cx.beginPath(); cx.arc(cxp,cyp,r,0,TAU); cx.stroke();
  cx.save(); cx.translate(cxp,cyp); cx.rotate(s.pitch*0.5);
  cx.strokeStyle="#e8b94a"; cx.lineWidth=2.5*DPR;
  cx.beginPath(); cx.moveTo(-r*0.8,0); cx.lineTo(r*0.8,0); cx.stroke();
  cx.restore();
  cx.fillStyle="#7d8a7c"; cx.font=`${9*DPR}px monospace`; cx.textAlign="center";
  cx.fillText("ASSIETTE", cxp, cyp+r+12*DPR);
}

/* ---------- rendering: tactical map ---------- */
function drawMap(){
  const w=cvM.width,h=cvM.height,cx=cxM,s=G.sub;
  cx.clearRect(0,0,w,h);
  cx.fillStyle="#06140d"; cx.fillRect(0,0,w,h);
  const m=Math.min(w,h)*0.94, ox=(w-m)/2, oy=(h-m)/2, sc=m/WORLD*MAPV.z;
  // keep the view centre inside the world so you can't pan into the void
  const span=WORLD/MAPV.z;
  MAPV.cx=clamp(MAPV.cx,span/2,WORLD-span/2); MAPV.cy=clamp(MAPV.cy,span/2,WORLD-span/2);
  const X=v=>ox+m/2+(v-MAPV.cx)*sc, Y=v=>oy+m/2+(v-MAPV.cy)*sc;
  MAPV.toWorld=(px,py)=>({x:(px-ox-m/2)/sc+MAPV.cx, y:(py-oy-m/2)/sc+MAPV.cy});
  cx.save(); cx.beginPath(); cx.rect(ox,oy,m,m); cx.clip();

  // grid (world-anchored so it zooms/pans with the chart)
  cx.strokeStyle="rgba(95,240,138,.10)"; cx.lineWidth=1;
  for(let i=0;i<=6;i++){ const gw=WORLD*i/6;
    cx.beginPath();cx.moveTo(X(gw),Y(0));cx.lineTo(X(gw),Y(WORLD));cx.stroke();
    cx.beginPath();cx.moveTo(X(0),Y(gw));cx.lineTo(X(WORLD),Y(gw));cx.stroke(); }
  cx.strokeStyle="rgba(95,240,138,.22)"; cx.strokeRect(X(0),Y(0),WORLD*sc,WORLD*sc);

  // terrain: shoals + landmasses + reefs (labelled like the minefield)
  const zlabel=(txt,bx,by,col)=>{
    const lx=clamp(X(bx),ox+22*DPR,ox+m-22*DPR), ly=clamp(Y(by),oy+14*DPR,oy+m-8*DPR);
    cx.font=`${9*DPR}px monospace`; cx.textAlign="center";
    cx.fillStyle="rgba(4,10,7,.6)"; const tw=cx.measureText(txt).width;
    cx.fillRect(lx-tw/2-4*DPR,ly-9*DPR,tw+8*DPR,13*DPR);
    cx.fillStyle=col; cx.fillText(txt,lx,ly+1*DPR);
  };
  for(const b of G.terrain.blobs){
    if(b.reef){
      cx.fillStyle="rgba(120,150,90,.14)";
      cx.beginPath(); cx.ellipse(X(b.x),Y(b.y),b.rx*b.shoal*sc,b.ry*b.shoal*sc,0,0,TAU); cx.fill();
      cx.strokeStyle="rgba(150,180,110,.5)"; cx.lineWidth=1*DPR; cx.setLineDash([3*DPR,3*DPR]);
      cx.beginPath(); cx.ellipse(X(b.x),Y(b.y),b.rx*sc,b.ry*sc,0,0,TAU); cx.stroke(); cx.setLineDash([]);
      zlabel("⚠ HAUT-FOND", b.x, b.y, "rgba(180,205,120,.85)");
      continue;
    }
    cx.fillStyle="rgba(40,95,80,.20)";
    cx.beginPath(); cx.ellipse(X(b.x),Y(b.y),b.rx*b.shoal*sc,b.ry*b.shoal*sc,0,0,TAU); cx.fill();
    cx.fillStyle="#2c3a24"; cx.strokeStyle="#465a35"; cx.lineWidth=1.5*DPR;
    cx.beginPath(); cx.ellipse(X(b.x),Y(b.y),b.rx*sc,b.ry*sc,0,0,TAU); cx.fill(); cx.stroke();
    zlabel(b.rx>=WORLD*0.4?"CÔTE":"ÎLE", b.x, b.y, "rgba(150,200,140,.9)");
  }
  // minefield danger zone
  if(G.mineZone){
    const z=G.mineZone;
    cx.fillStyle="rgba(224,83,58,.10)";
    cx.beginPath(); cx.arc(X(z.x),Y(z.y),z.r*sc,0,TAU); cx.fill();
    cx.strokeStyle="rgba(224,83,58,.45)"; cx.lineWidth=1.2*DPR; cx.setLineDash([6*DPR,5*DPR]);
    cx.beginPath(); cx.arc(X(z.x),Y(z.y),z.r*sc,0,TAU); cx.stroke(); cx.setLineDash([]);
    zlabel("⚓ MINES", z.x, z.y, "rgba(255,120,95,.9)");
  }

  // visual range (what the periscope/lookout can see) + hydrophone reach
  const visR=currentVisRange();
  cx.strokeStyle="rgba(95,240,138,.16)"; cx.lineWidth=1;
  cx.beginPath(); cx.arc(X(s.x),Y(s.y),visR*sc,0,TAU); cx.stroke();
  cx.setLineDash([3*DPR,5*DPR]); cx.strokeStyle="rgba(95,180,240,.14)";
  cx.beginPath(); cx.arc(X(s.x),Y(s.y),HYDRO_BASE*sc,0,TAU); cx.stroke(); cx.setLineDash([]);
  // periscope view cone (when raised)
  if(s.peri>0.6 && s.depth<=PERISCOPE_DEPTH){
    cx.fillStyle="rgba(232,200,120,.06)";
    cx.beginPath(); cx.moveTo(X(s.x),Y(s.y));
    cx.arc(X(s.x),Y(s.y),visR*sc,s.scope-0.62,s.scope+0.62); cx.closePath(); cx.fill();
  }

  // depth-charge booms
  for(const b of G.booms){
    cx.strokeStyle=`rgba(224,83,58,${b.life})`; cx.lineWidth=2*DPR;
    cx.beginPath(); cx.arc(X(b.x),Y(b.y),(1-b.life)*40*DPR+6*DPR,0,TAU); cx.stroke();
  }
  // wrecks (fading markers where ships went down)
  for(const wk of G.wrecks){
    const a=clamp(wk.life/7,0,1), X1=X(wk.x),Y1=Y(wk.y),r=4*DPR;
    cx.strokeStyle=`rgba(150,160,150,${a*0.7})`; cx.lineWidth=1.5*DPR;
    cx.beginPath(); cx.moveTo(X1-r,Y1-r);cx.lineTo(X1+r,Y1+r);
    cx.moveTo(X1+r,Y1-r);cx.lineTo(X1-r,Y1+r); cx.stroke();
  }
  // ship explosions — filled fireball
  for(const e of G.explosions){
    const p=1-e.life/e.max, r=(8+p*40)*DPR, a=e.life/e.max;
    const g=cx.createRadialGradient(X(e.x),Y(e.y),0,X(e.x),Y(e.y),r);
    g.addColorStop(0,`rgba(255,235,160,${a})`);
    g.addColorStop(.5,`rgba(240,140,40,${a*0.85})`);
    g.addColorStop(1,"rgba(120,40,20,0)");
    cx.fillStyle=g; cx.beginPath(); cx.arc(X(e.x),Y(e.y),r,0,TAU); cx.fill();
  }

  // torpedoes + wakes
  for(const t of G.torps){
    cx.strokeStyle="rgba(232,185,74,.5)"; cx.lineWidth=1.5*DPR;
    cx.beginPath(); cx.moveTo(X(t.x),Y(t.y));
    cx.lineTo(X(t.x-Math.cos(t.hdg)*120),Y(t.y-Math.sin(t.hdg)*120)); cx.stroke();
    cx.fillStyle="#e8b94a"; cx.beginPath(); cx.arc(X(t.x),Y(t.y),2.5*DPR,0,TAU); cx.fill();
  }

  // --- radio intelligence datums (uncertain, may be stale or false) ---
  for(const it of G.intel){
    const age=G.t-it.time, a=clamp(1-age/240,0.12,1);
    cx.strokeStyle=`rgba(232,185,74,${a*0.6})`; cx.lineWidth=1.2*DPR; cx.setLineDash([5*DPR,4*DPR]);
    cx.beginPath(); cx.arc(X(it.x),Y(it.y),it.r*sc,0,TAU); cx.stroke(); cx.setLineDash([]);
    // reported course arrow
    cx.strokeStyle=`rgba(232,185,74,${a*0.7})`;
    cx.beginPath(); cx.moveTo(X(it.x),Y(it.y));
    cx.lineTo(X(it.x)+Math.cos(it.course)*22*DPR, Y(it.y)+Math.sin(it.course)*22*DPR); cx.stroke();
    cx.fillStyle=`rgba(232,185,74,${a*0.8})`; cx.font=`${8.5*DPR}px monospace`; cx.textAlign="center";
    cx.fillText("contact signalé", X(it.x), Y(it.y)-it.r*sc-4*DPR);
  }

  // --- hydrophone bearings (direction only, no range) ---
  for(const snd of G.sound){
    const len=(snd.strong?visR*1.4:visR*1.0)*sc;
    cx.strokeStyle = snd.strong ? "rgba(95,240,138,.5)" : "rgba(95,240,138,.22)";
    cx.lineWidth=(snd.strong?2:1)*DPR; if(!snd.strong) cx.setLineDash([4*DPR,5*DPR]);
    cx.beginPath(); cx.moveTo(X(s.x),Y(s.y));
    cx.lineTo(X(s.x)+Math.cos(snd.b)*len, Y(s.y)+Math.sin(snd.b)*len); cx.stroke(); cx.setLineDash([]);
  }
  if(G.sound.length){ cx.fillStyle="rgba(95,240,138,.7)"; cx.font=`${9*DPR}px monospace`;
    cx.textAlign="left"; cx.fillText("hydrophone : bruits d'hélices", X(s.x)+10*DPR, Y(s.y)-10*DPR); }

  // active Asdic pings (expanding cyan rings)
  for(const p of G.pings){
    const a=p.life/p.max;
    cx.strokeStyle=`rgba(120,210,255,${a*0.7})`; cx.lineWidth=2*DPR;
    cx.beginPath(); cx.arc(X(p.x),Y(p.y),(1-a)*2400*sc+6*DPR,0,TAU); cx.stroke();
  }
  // --- contacts actually SEEN (visual), fading from memory ---
  for(const c of G.contacts){
    if(!c.alive || c.seen===undefined) continue;
    const age=G.t-c.seen; if(age>25) continue;
    const a=clamp(1-age/25,0,1), px=X(c.x),py=Y(c.y), esc=c.type==="escort";
    cx.fillStyle= esc?`rgba(224,83,58,${0.4+0.6*a})`:`rgba(232,185,74,${0.4+0.6*a})`;
    cx.strokeStyle=cx.fillStyle; cx.lineWidth=1.5*DPR;
    cx.beginPath(); cx.arc(px,py,4*DPR,0,TAU); cx.fill();
    cx.beginPath(); cx.moveTo(px,py);
    cx.lineTo(px+Math.cos(c.hdg)*11*DPR,py+Math.sin(c.hdg)*11*DPR); cx.stroke();
    cx.fillStyle= esc?`rgba(224,83,58,${a})`:`rgba(232,185,74,${a})`;
    cx.font=`${9*DPR}px monospace`; cx.textAlign="center";
    cx.fillText(esc?"ESCORTE":(c.kind==="tanker"?"PÉTROLIER":"LIBERTY"),px,py-9*DPR);
  }

  // TDC locked target bracket
  if(s.tdc.on && s.tdc.tgt && s.tdc.tgt.alive){
    const c=s.tdc.tgt, px=X(c.x),py=Y(c.y), r=9*DPR;
    cx.strokeStyle="rgba(95,240,138,.9)"; cx.lineWidth=1.6*DPR;
    cx.beginPath();
    cx.moveTo(px-r,py-r+3*DPR);cx.lineTo(px-r,py-r);cx.lineTo(px-r+3*DPR,py-r);
    cx.moveTo(px+r,py-r+3*DPR);cx.lineTo(px+r,py-r);cx.lineTo(px+r-3*DPR,py-r);
    cx.moveTo(px-r,py+r-3*DPR);cx.lineTo(px-r,py+r);cx.lineTo(px-r+3*DPR,py+r);
    cx.moveTo(px+r,py+r-3*DPR);cx.lineTo(px+r,py+r);cx.lineTo(px+r-3*DPR,py+r);
    cx.stroke();
  }

  // Bold decoys — expanding bubble rings
  for(const d of (G.decoys||[])){
    const a=clamp(d.t/40,0,1), px=X(d.x),py=Y(d.y);
    cx.strokeStyle=`rgba(120,235,170,${0.25+0.45*a})`; cx.lineWidth=1.2*DPR;
    for(let r=4;r<=10;r+=3){ cx.beginPath(); cx.arc(px,py,r*DPR,0,TAU); cx.stroke(); }
    cx.fillStyle=`rgba(120,235,170,${0.6*a})`; cx.font=`${8*DPR}px monospace`; cx.textAlign="center";
    cx.fillText("LEURRE",px,py-13*DPR);
  }

  // aircraft — only known when surfaced (visual lookout); no air-search radar aboard, none tracked submerged
  if(s.depth<6) for(const p of G.planes){
    const px=X(p.x),py=Y(p.y), atk=p.state==="attack";
    cx.save(); cx.translate(px,py); cx.rotate(p.hdg);
    cx.fillStyle= atk?"#ff7a4a":"#cfe0d2";
    cx.beginPath(); cx.moveTo(10*DPR,0); cx.lineTo(-5*DPR,-5*DPR); cx.lineTo(-2*DPR,0); cx.lineTo(-5*DPR,5*DPR); cx.closePath(); cx.fill();
    cx.fillRect(-1*DPR,-9*DPR,2*DPR,18*DPR);   // wings
    cx.restore();
    if(atk){ cx.strokeStyle="rgba(255,122,74,.5)"; cx.lineWidth=1*DPR;
      cx.beginPath(); cx.arc(px,py,12*DPR,0,TAU); cx.stroke(); }
  }

  // own sub
  const sx=X(s.x),sy=Y(s.y);
  cx.save(); cx.translate(sx,sy); cx.rotate(s.hdg);
  cx.fillStyle="#5ff08a"; cx.strokeStyle="#06140d"; cx.lineWidth=1.5*DPR;
  cx.beginPath();
  cx.moveTo(11*DPR,0); cx.lineTo(-7*DPR,-5*DPR); cx.lineTo(-4*DPR,0); cx.lineTo(-7*DPR,5*DPR);
  cx.closePath(); cx.fill(); cx.stroke();
  cx.restore();
  // sub heading line + periscope bearing
  cx.strokeStyle="rgba(95,240,138,.3)"; cx.setLineDash([4*DPR,4*DPR]);
  cx.beginPath(); cx.moveTo(sx,sy);
  cx.lineTo(sx+Math.cos(s.hdg)*60*DPR,sy+Math.sin(s.hdg)*60*DPR); cx.stroke();
  cx.setLineDash([]);

  // weather + time-of-day readout
  const tod=todInfo(G.env.clock), hh=Math.floor(((G.env.clock%24)+24)%24);
  cx.fillStyle="rgba(216,224,212,.7)"; cx.font=`${10*DPR}px monospace`; cx.textAlign="right";
  cx.fillText(G.env.weather.name+" · "+tod.label+" "+String(hh).padStart(2,"0")+"h00",
    ox+m-6*DPR, oy+13*DPR);

  // compass + objective
  cx.fillStyle="rgba(95,240,138,.5)"; cx.font=`${10*DPR}px monospace`;
  cx.textAlign="left"; cx.fillText("N",ox+m/2-3*DPR,oy+12*DPR);
  cx.textAlign="left"; cx.fillStyle="rgba(232,185,74,.85)"; cx.font=`${11*DPR}px monospace`;
  // tap-set waypoint marker
  if(G.courseTgt){
    const px=X(G.courseTgt.x),py=Y(G.courseTgt.y);
    cx.strokeStyle="rgba(232,185,74,.85)"; cx.lineWidth=1.4*DPR;
    cx.beginPath(); cx.arc(px,py,7*DPR,0,TAU); cx.stroke();
    cx.beginPath(); cx.moveTo(px-11*DPR,py); cx.lineTo(px+11*DPR,py);
    cx.moveTo(px,py-11*DPR); cx.lineTo(px,py+11*DPR); cx.stroke();
    cx.setLineDash([4*DPR,4*DPR]); cx.strokeStyle="rgba(232,185,74,.4)";
    cx.beginPath(); cx.moveTo(X(s.x),Y(s.y)); cx.lineTo(px,py); cx.stroke(); cx.setLineDash([]);
  }
  // TDC predictive firing line (torpedo track → intercept, target lead → intercept)
  if(s.tdc.on && s.tdc.valid && s.tdc.tgt && s.tdc.tgt.alive){
    const t=s.tdc, aim=s.hdg+t.gyro, tt=t.rng/TORP_SPD;
    const ix=s.x+Math.cos(aim)*Math.min(t.rng*1.05,TORP_RANGE);
    const iy=s.y+Math.sin(aim)*Math.min(t.rng*1.05,TORP_RANGE);
    cx.setLineDash([6*DPR,4*DPR]); cx.lineWidth=1.4*DPR;
    cx.strokeStyle="rgba(95,240,138,.75)";
    cx.beginPath(); cx.moveTo(X(s.x),Y(s.y)); cx.lineTo(X(ix),Y(iy)); cx.stroke();
    const c=t.tgt, fx=c.x+Math.cos(c.hdg)*c.spd*KN*tt, fy=c.y+Math.sin(c.hdg)*c.spd*KN*tt;
    cx.strokeStyle="rgba(232,185,74,.55)";
    cx.beginPath(); cx.moveTo(X(c.x),Y(c.y)); cx.lineTo(X(fx),Y(fy)); cx.stroke();
    cx.setLineDash([]);
    cx.fillStyle="rgba(95,240,138,.9)";
    cx.beginPath(); cx.arc(X(fx),Y(fy),3*DPR,0,TAU); cx.fill();
  }
  cx.restore();   // end world clip
  cx.fillStyle="rgba(232,185,74,.85)"; cx.font=`${11*DPR}px monospace`; cx.textAlign="left";
  const obj = G.phase==="transit" ? "EN PATROUILLE — recherche d'un convoi"
    : G.scenario.duel ? "DUEL — couler le destroyer"
    : `Convoi #${G.convoyNum||1} — coulés ${G.merchSunk}/${G.need}`;
  cx.fillText(obj, ox+8*DPR, oy+m-10*DPR);
  if(MAPV.z>1.01){ cx.fillStyle="rgba(152,166,150,.8)"; cx.font=`${9*DPR}px monospace`; cx.textAlign="right";
    cx.fillText("zoom ×"+MAPV.z.toFixed(1)+" — double-toucher : réinitialiser", ox+m-8*DPR, oy+m-10*DPR); cx.textAlign="left"; }
}

/* ---------- rendering: periscope ---------- */
function drawPeri(){
  const w=cvP.width,h=cvP.height,cx=cxP,s=G.sub;
  cx.clearRect(0,0,w,h);
  const up = s.peri>0.9 && s.depth<=PERISCOPE_DEPTH;
  const horizon=h*0.46;
  if(up){
    const env=G.env, tod=todInfo(env.clock), light=tod.light, visR=currentVisRange();
    const fog=env.weather.fog, sea=env.weather.sea;
    // sky tinted by time of day
    const sky1=mix("#1a2735","#7d8e94",light), sky2=mix("#26323a","#aeb7b4",light);
    let g=cx.createLinearGradient(0,0,0,horizon);
    g.addColorStop(0,sky1); g.addColorStop(1,sky2);
    cx.fillStyle=g; cx.fillRect(0,0,w,horizon);
    // sea
    const sea1=mix("#0b1518","#243b3f",light), sea2=mix("#05090b","#0d1c1f",light);
    g=cx.createLinearGradient(0,horizon,0,h);
    g.addColorStop(0,sea1); g.addColorStop(1,sea2);
    cx.fillStyle=g; cx.fillRect(0,horizon,w,h-horizon);
    // a few stars at night
    if(light<0.3){ cx.fillStyle="rgba(220,230,240,.5)";
      for(let i=0;i<26;i++){ const sx2=(i*137.5)%w, sy2=(i*53.7)%horizon;
        cx.fillRect(sx2,sy2,1.2*DPR,1.2*DPR); } }

    const FOV=42*D2R, half=w*0.5;
    let centered=null, cRel=99;
    // ships — only if within visual range and within the scope's field of view
    const drawn=[];
    for(const c of G.contacts){
      if(!c.alive) continue;
      const rel=norm(angTo(s.x,s.y,c.x,c.y)-s.scope);
      if(Math.abs(rel)>FOV) continue;
      const dM=dist(s.x,s.y,c.x,c.y);
      if(dM>visR) continue;                          // beyond visibility: invisible
      drawn.push({c,dM,rel});
      if(Math.abs(rel)<Math.abs(cRel)){ cRel=rel; centered={c,dM}; }
    }
    G.lastDrawn=drawn;
    drawn.sort((a,b)=>b.dM-a.dM);
    for(const o of drawn){
      const px=half+(o.rel/FOV)*half;
      const scale=clamp(1600/o.dM,0.22,3.2);
      const fade=clamp(1-(o.dM/visR)*(0.6+fog*0.5),0.05,1); // fade near the limit / in fog
      const swell = sea*scale*4*DPR*Math.sin(G.t*1.5+o.dM*0.01);
      // foreshortening: angle between the ship's heading and our line of sight
      const asp=norm(o.c.hdg - angTo(s.x,s.y,o.c.x,o.c.y));
      const xscale=(asp<0?-1:1)*(0.26+0.74*Math.abs(Math.sin(asp)));  // bow/stern-on → narrow, beam → wide
      cx.globalAlpha=fade;
      drawShipSil(cx,px,horizon+swell,scale*DPR,o.c.type,xscale);
      cx.globalAlpha=1;
    }
    // explosions in view
    for(const e of G.explosions){
      const rel=norm(angTo(s.x,s.y,e.x,e.y)-s.scope);
      if(Math.abs(rel)>FOV) continue;
      const dM=dist(s.x,s.y,e.x,e.y);
      drawBlast(cx, half+(rel/FOV)*half, horizon, clamp(1600/dM,0.3,3)*DPR, 1-e.life/e.max);
    }
    // atmospheric haze / fog wash
    if(fog>0.05){ cx.fillStyle=`rgba(200,206,205,${fog*0.45*light+0.05})`; cx.fillRect(0,0,w,h); }
    // rain streaks
    if(env.weather.id==="rain"||env.weather.id==="storm"){
      cx.strokeStyle="rgba(180,200,210,.18)"; cx.lineWidth=1;
      for(let i=0;i<60;i++){ const rx=(i*welt(i)+G.t*300)%w, ry=(i*97+G.t*600)%h;
        cx.beginPath(); cx.moveTo(rx,ry); cx.lineTo(rx-4*DPR,ry+12*DPR); cx.stroke(); }
    }

    drawReticle(cx,w,h,horizon,false);

    // nearest target on the BOW axis (for alignment feedback)
    let bowT=null, bowRel=99;
    for(const o of drawn){ const rs=norm(angTo(s.x,s.y,o.c.x,o.c.y)-s.hdg);
      if(Math.abs(rs)<Math.abs(bowRel)){ bowRel=rs; bowT={...o, rs}; } }
    const aligned = bowT && bowT.dM<TORP_RANGE && (bowT.dM*Math.abs(Math.sin(bowT.rs)) < 95);

    // bow axis marker — torpedoes run THIS way; turns green when a target is lined up
    const relBow=norm(s.hdg - s.scope);
    const bowCol = aligned ? "#5fff8a" : "#ff6a4a";
    if(Math.abs(relBow)<FOV){
      const bx=half + (relBow/FOV)*half;
      cx.strokeStyle = aligned ? "rgba(95,255,138,.95)" : "rgba(255,70,50,.95)";
      cx.lineWidth=2.5*DPR; cx.setLineDash([6*DPR,4*DPR]);
      cx.beginPath(); cx.moveTo(bx,horizon-h*0.34); cx.lineTo(bx,h); cx.stroke(); cx.setLineDash([]);
      ptext(cx,"PROUE",bx,horizon-h*0.34-5*DPR,bowCol,10,"center");
    } else {
      const left=relBow<0;
      ptext(cx, left?"◄ proue":"proue ►", left?12*DPR:w-12*DPR, horizon+34*DPR, bowCol,13,left?"left":"right");
    }

    // optical vignette — on the scene, BEHIND the HUD readouts so the corners stay legible
    { const gv=cx.createRadialGradient(w*0.5,h*0.5,Math.min(w,h)*0.30,w*0.5,h*0.5,Math.min(w,h)*0.62);
      gv.addColorStop(0,"rgba(0,0,0,0)"); gv.addColorStop(1,"rgba(0,0,0,.93)");
      cx.fillStyle=gv; cx.fillRect(0,0,w,h); }

    // ---- top info bar : two clear columns ----
    cx.fillStyle="rgba(4,8,6,.7)"; cx.fillRect(0,0,w,50*DPR);
    const brg=Math.round((s.scope*R2D+90+360)%360);
    const hh=Math.floor(((env.clock%24)+24)%24);
    ptext(cx,"REL "+String(brg).padStart(3,"0")+"°", 10*DPR, 20*DPR, "#9dffb8",12,"left");
    ptext(cx,"VISI "+(visR>=WORLD?"max":Math.round(visR)+" m"), 10*DPR, 41*DPR, "#9dffb8",12,"left");
    ptext(cx, hh+"h · "+tod.label, w-10*DPR, 20*DPR, "#ffffff",12,"right");
    ptext(cx, env.weather.name, w-10*DPR, 41*DPR, "#ffd24a",12,"right");

    // target under the crosshair — dark pill, bright text + aspect
    if(centered && Math.abs(cRel)<8*D2R){
      const label=(centered.c.type==="escort"?"ESCORTE":(centered.c.kind==="tanker"?"PÉTROLIER":"LIBERTY"))+"  "+Math.round(centered.dM)+" m";
      const asp=aspectLabel(centered.c,s);
      const ty=horizon-80*DPR;
      cx.font=`bold ${13*DPR}px monospace`; const tw=cx.measureText(label).width;
      cx.fillStyle="rgba(4,8,6,.72)";
      rounded(cx, w*0.5-tw/2-10*DPR, ty-15*DPR, tw+20*DPR, 22*DPR, 5*DPR); cx.fill();
      ptext(cx,label, w*0.5, ty, "#ffd24a",13,"center");
      ptext(cx,"vu "+asp, w*0.5, ty+18*DPR, "#9dffb8",11,"center");
    }

    // ---- bottom firing-solution bar ----
    cx.fillStyle="rgba(4,8,6,.72)"; cx.fillRect(0,h-40*DPR,w,40*DPR);
    const tdc=s.tdc;
    if(tdc.on){
      ptext(cx,"TDC · cap "+String(Math.round((tdc.crs*R2D+90+360)%360)).padStart(3,"0")
        +"° · "+tdc.spd.toFixed(0)+" nd · "+Math.round(tdc.rng)+" m", w*0.5, horizon-58*DPR, "#9dffb8",11,"center");
      if(tdc.valid) ptext(cx,"◉ SOLUTION TDC — gyro "+(tdc.gyro>=0?"+":"")+Math.round(tdc.gyro*R2D)+"° — FEU !", w*0.5, h-14*DPR, "#5fff8a",13,"center");
      else ptext(cx,"TDC : pas de solution (hors portée / angle)", w*0.5, h-14*DPR, "#cdd6cc",12,"center");
    } else if(bowT && bowT.dM<TORP_RANGE){
      if(aligned) ptext(cx,"◉ SOLUTION DE TIR — FEU !", w*0.5, h-14*DPR, "#5fff8a",14,"center");
      else ptext(cx,"BARRE À "+(bowT.rs>0?"DROITE":"GAUCHE")+" — "+Math.round(Math.abs(bowT.rs)*R2D)+"° pour aligner la proue",
        w*0.5, h-14*DPR, "#ffd24a",12,"center");
    } else if(bowT){ ptext(cx,"cible hors de portée", w*0.5, h-14*DPR, "#cdd6cc",12,"center"); }
  } else {
    cx.fillStyle="#05080a"; cx.fillRect(0,0,w,h);
    const gv=cx.createRadialGradient(w*0.5,h*0.5,Math.min(w,h)*0.30,w*0.5,h*0.5,Math.min(w,h)*0.62);
    gv.addColorStop(0,"rgba(0,0,0,0)"); gv.addColorStop(1,"rgba(0,0,0,.93)");
    cx.fillStyle=gv; cx.fillRect(0,0,w,h);
    drawReticle(cx,w,h,h*0.5,true);
    ptext(cx,"Périscope baissé", w*0.5, h*0.5-12*DPR, "#cdd6cc",14,"center");
    ptext(cx,"Remonter à ≤ 14 m, puis hisser le périscope", w*0.5, h*0.5+12*DPR, "#9aa7a6",12,"center");
  }
}
function ptext(cx,txt,x,y,col,size,align){
  cx.font=`bold ${size*DPR}px monospace`; cx.textAlign=align||"left"; cx.textBaseline="alphabetic";
  cx.lineJoin="round"; cx.lineWidth=3.5*DPR; cx.strokeStyle="rgba(0,0,0,.9)";
  cx.strokeText(txt,x,y); cx.fillStyle=col; cx.fillText(txt,x,y);
}
function welt(i){ return ((i*73)%50)+30; }
function mix(c1,c2,t){
  const a=parseInt(c1.slice(1),16), b=parseInt(c2.slice(1),16);
  const r=Math.round((a>>16)+(((b>>16)-(a>>16))*t));
  const g=Math.round(((a>>8)&255)+((((b>>8)&255)-((a>>8)&255))*t));
  const bl=Math.round((a&255)+(((b&255)-(a&255))*t));
  return `rgb(${r},${g},${bl})`;
}
function drawReticle(cx,w,h,horizon,dim){
  cx.strokeStyle=dim?"rgba(95,240,138,.2)":"rgba(95,240,138,.5)"; cx.lineWidth=1*DPR;
  cx.beginPath(); cx.moveTo(0,horizon); cx.lineTo(w,horizon); cx.stroke();
  cx.beginPath(); cx.moveTo(w*0.5,0); cx.lineTo(w*0.5,h); cx.stroke();
  cx.strokeStyle=dim?"rgba(95,240,138,.15)":"rgba(95,240,138,.32)";
  for(let i=-4;i<=4;i++){ if(!i)continue; const x=w*0.5+i*30*DPR;
    cx.beginPath(); cx.moveTo(x,horizon-6*DPR); cx.lineTo(x,horizon+6*DPR); cx.stroke(); }
  for(let i=-3;i<=3;i++){ if(!i)continue; const y=horizon+i*24*DPR;
    cx.beginPath(); cx.moveTo(w*0.5-6*DPR,y); cx.lineTo(w*0.5+6*DPR,y); cx.stroke(); }
}
function drawBlast(cx,x,base,sc,prog){
  const r=(16+prog*42)*sc, y=base-r*0.45, a=1-prog;
  const g=cx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,`rgba(255,242,190,${a})`);
  g.addColorStop(0.4,`rgba(240,150,40,${a})`);
  g.addColorStop(0.8,`rgba(130,45,20,${a*0.8})`);
  g.addColorStop(1,"rgba(40,30,30,0)");
  cx.fillStyle=g; cx.beginPath(); cx.arc(x,y,r,0,TAU); cx.fill();
  if(prog>0.4){ cx.fillStyle=`rgba(60,55,55,${(prog-0.4)*0.6})`;
    cx.beginPath(); cx.arc(x,y-r*0.6,r*0.5,0,TAU); cx.fill(); }
}
function drawShipSil(cx,x,base,sc,type,xscale){
  const wsh=46*sc, hsh=10*sc;
  cx.save(); cx.translate(x,base); cx.scale(xscale,1); cx.fillStyle="#0d1417";
  if(type==="escort"){
    // warship: long, low flush-deck hull, gun turrets, two raked funnels
    const w2=wsh*0.60, h2=hsh*0.62;
    cx.beginPath();
    cx.moveTo(-w2,0); cx.lineTo(w2*0.86,0); cx.lineTo(w2,-h2*0.6);
    cx.lineTo(w2*0.55,-h2); cx.lineTo(-w2*0.82,-h2); cx.closePath(); cx.fill();
    cx.fillRect(w2*0.34,-h2-hsh*0.5, wsh*0.09, hsh*0.5);      // forward gun turret
    cx.fillRect(w2*0.06,-h2-hsh*1.15, wsh*0.12, hsh*1.15);    // bridge
    cx.fillRect(-w2*0.06,-h2-hsh*1.35, wsh*0.05, hsh*1.35);   // funnel 1
    cx.fillRect(-w2*0.26,-h2-hsh*1.2,  wsh*0.05, hsh*1.2);    // funnel 2
    cx.fillRect(w2*0.13,-h2-hsh*2.0,   wsh*0.018,hsh*0.9);    // mast
    cx.fillRect(-w2*0.58,-h2-hsh*0.45, wsh*0.08, hsh*0.45);   // aft gun
  } else {
    // merchant: high freeboard, central bridge, one fat funnel, tall fore/aft masts
    const w2=wsh*0.5, h2=hsh*1.05;
    cx.beginPath();
    cx.moveTo(-w2,0); cx.lineTo(w2,0); cx.lineTo(w2*0.8,-h2); cx.lineTo(-w2*0.84,-h2); cx.closePath(); cx.fill();
    cx.fillRect(-wsh*0.11,-h2-hsh*1.35, wsh*0.24, hsh*1.35);  // bridge house
    cx.fillRect(wsh*0.0,  -h2-hsh*2.1,  wsh*0.08, hsh*0.85);  // fat funnel
    cx.fillRect(-wsh*0.42,-h2-hsh*1.9,  wsh*0.03, hsh*1.9);   // fore mast
    cx.fillRect(wsh*0.40, -h2-hsh*1.9,  wsh*0.03, hsh*1.9);   // aft mast
  }
  cx.restore();
}

function aspectLabel(c,s){
  const a=Math.abs(norm(c.hdg - angTo(s.x,s.y,c.x,c.y) - Math.PI))*R2D; // 0=de face, 180=de poupe
  if(a<25)  return "de face";
  if(a<70)  return "3/4 avant";
  if(a<110) return "de profil";
  if(a<155) return "3/4 arrière";
  return "de poupe";
}
function rounded(cx,x,y,w,h,r){
  cx.beginPath();
  cx.moveTo(x+r,y); cx.arcTo(x+w,y,x+w,y+h,r); cx.arcTo(x+w,y+h,x,y+h,r);
  cx.arcTo(x,y+h,x,y,r); cx.arcTo(x,y,x+w,y,r); cx.closePath();
}

/* ---------- loop ---------- */
let last=0, TC=1;
function loop(ts){
  const dt=Math.min(0.05,(ts-last)/1000)||0; last=ts;
  if(!G){ requestAnimationFrame(loop); return; }   // chooser open, no game yet
  if(G.running && !G.over){
    step(dt*SIM*TC); tcSafeCheck();
    G.saveAcc=(G.saveAcc||0)+dt; if(G.saveAcc>4){ G.saveAcc=0; savePatrol(); }
  } else { engineStop(); }
  // render the active view
  const av=$(".view.on").dataset.v;
  if(av==="cockpit") drawCockpit(); else if(av==="peri") drawPeri();
  else if(av==="map") drawMap(); else updateComms(dt);
  hud();
  requestAnimationFrame(loop);
}
const PKEY="uboot_patrol";
function savePatrol(){
  if(!G||!G.running||G.over) return;
  try{ localStorage.setItem(PKEY, JSON.stringify(G)); }catch(e){}
}
function loadPatrol(){ try{ return JSON.parse(localStorage.getItem(PKEY)); }catch(e){ return null; } }
function clearPatrol(){ try{ localStorage.removeItem(PKEY); }catch(e){} }
function resumePatrol(){
  const snap=loadPatrol(); if(!snap) return;
  audio();
  G=snap; G.running=true; G.over=false; G.saveAcc=0;
  if(G.shells==null) G.shells=60;
  if(G.bolds==null) G.bolds=4;
  if(!G.decoys) G.decoys=[];
  if(G.gunT==null) G.gunT=0;
  G.sub.tdc={on:false,tgt:null,valid:false,gyro:0,brg:0,rng:0,spd:0,crs:0}; // relink safety
  saidOnceReset(); ovl.classList.add("hide"); resize(); updateFireBtn(); syncSpeedBtns();
