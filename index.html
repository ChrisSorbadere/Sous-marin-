    b.innerHTML=`<span style="color:var(--amber)">${sc.name}</span><br>`+
                `<span style="font-size:11px;color:var(--txt-dim);letter-spacing:.04em;text-transform:none">${sc.line}</span>`;
    b.onclick=()=>startMission(sc);
    list.appendChild(b);
  });
  card.querySelector("#resetCar").onclick=()=>{ saveCareer({patrols:0,tonnage:0}); saveKtb([]); showBrief(); };
  card.querySelector("#showKtb").onclick=showLogbook;
  ovl.classList.remove("hide");
}
function showLogbook(){
  const arch=loadKtb().slice().reverse();
  const rows = arch.length
    ? arch.map(p=>{ const d=new Date(p.ts);
        const dd=`${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;
        return `<tr><td>${dd}</td><td>${p.scen||""}</td><td style="text-align:right">${(p.tons||0).toLocaleString("fr")} t</td><td>${p.lost?"✖":p.medal||"—"}</td></tr>`;
      }).join("")
    : `<tr><td colspan="4" style="color:var(--txt-dim)">Aucune patrouille enregistrée.</td></tr>`;
  const car=loadCareer();
  card.innerHTML=`
    <h1>Journal de bord</h1>
    <div class="sub">Carrière — ${car.tonnage.toLocaleString("fr")} t · grade ${rankOf(car.tonnage)}</div>
    <div class="ktb"><table><tr style="color:var(--txt-dim)"><td>Date</td><td>Patrouille</td><td style="text-align:right">Tonnage</td><td>Distinction</td></tr>${rows}</table></div>
    <button class="go" id="backBtn">Retour</button>`;
  $("#backBtn").onclick=showBrief;
}
function startMission(sc){
  audio(); saidOnceReset(); newGame(sc); updateFireBtn();
  ovl.classList.add("hide"); G.running=true; resize();
  say(`Patrouille « ${sc.name} ». 14 torpilles à bord.`,"cmd");
  tutoStart(sc);
}
/* ---------- first-run tutorial : four contextual steps ---------- */
let tutoStep=-1;
const TUTO=[
  {txt:"<b>1/4 — Plongez.</b> Touchez <b>Périsc.</b> (rangée Immersion) pour rejoindre l'immersion périscopique (12 m).",
   done:()=>G.sub.depth>=8},
  {txt:"<b>2/4 — Hissez le périscope.</b> Touchez le bouton <b>Périscope ▲</b>, puis ouvrez l'onglet Périscope. Glissez le doigt sur la vue pour balayer l'horizon.",
   done:()=>G.sub.periUp},
  {txt:"<b>3/4 — Trouvez le convoi.</b> Ouvrez la <b>Carte</b> : ralliez le cercle ambre (renseignement radio). Touchez la carte pour mettre le cap ; pincez pour zoomer.",
   done:()=>G.contacts.some(c=>c.alive&&c.seen!==undefined&&G.t-c.seen<10)},
  {txt:"<b>4/4 — Tirez.</b> Au périscope, touchez un navire pour l'acquérir au <b>TDC</b>, attendez « SOLUTION » en vert, puis <b>FEU</b>.",
   done:()=>G.fired>0},
];
function tutoStart(sc){
  tutoStep=-1; $("#tuto").classList.remove("on");
  let done=false; try{ done=localStorage.getItem("uboot_tuto")==="1"; }catch(e){}
  if(done||sc.duel) return;
  tutoStep=0; tutoShow();
}
function tutoShow(){ $("#tutoTxt").innerHTML=TUTO[tutoStep].txt; $("#tuto").classList.add("on"); }
function tutoAdvance(){
  tutoStep++;
  if(tutoStep>=TUTO.length){ tutoStep=-1; $("#tuto").classList.remove("on");
    try{ localStorage.setItem("uboot_tuto","1"); }catch(e){}
    say("Bonne chasse, Kapitän !","cmd"); return; }
  tutoShow();
}
$("#tutoOK").onclick=()=>{ tutoStep=-1; $("#tuto").classList.remove("on");
  try{ localStorage.setItem("uboot_tuto","1"); }catch(e){} };
function showEnd(won){
  clearPatrol();                                           // this patrol is over
  const car=loadCareer();                                  // tonnage & patrols already updated in-mission
  const hull=Math.round(G.sub.hull);
  const medal=medalOf(G.patrolTons);
  const ktb=G.ktb||[];
  // archive this patrol in the career logbook
  const arch=loadKtb();
  arch.push({ts:Date.now(), scen:G.scenario.name, tons:G.patrolTons, ships:ktb.length, medal, lost:!won});
  saveKtb(arch);
  const headline = won ? "Patrouille terminée" : "Bâtiment perdu";
  const sub = won ? "Retour à la base" : "Le U-Boot a sombré";
  const resLine = won
    ? `${G.patrolTons.toLocaleString("fr")} t coulées · coque ${hull}%`
    : (G.loseReason||"Bâtiment perdu.");
  const rows = ktb.length
    ? ktb.map(e=>`<tr><td>J${e.day} ${e.hour}h</td><td>${e.label}</td><td>${e.grid}</td><td style="text-align:right">${e.tons.toLocaleString("fr")} t</td></tr>`).join("")
    : `<tr><td colspan="4" style="color:var(--txt-dim)">Aucun navire coulé.</td></tr>`;
  card.innerHTML=`
    <h1>${headline}</h1>
    <div class="sub">${sub}</div>
    <div class="res ${won?"win":"lose"}">${resLine}</div>
    <div class="obj">Distinction de patrouille : <b>${medal}</b></div>
    <div class="ktb"><div class="ktbT">Journal de bord (Kriegstagebuch)</div>
      <table>${rows}</table></div>
    <div class="obj">Cette patrouille : <b>${G.patrolTons.toLocaleString("fr")} t</b> · ${G.convoyNum||1} convoi(s)<br>
      Carrière : <b>${car.tonnage.toLocaleString("fr")} t</b> · ${car.patrols} patrouille(s) · grade <b>${rankOf(car.tonnage)}</b></div>
    <button class="go" id="reBtn" style="margin-bottom:8px">Recommencer — même scénario</button>
    <button class="go" id="goBtn">Nouvelle patrouille</button>`;
  ovl.classList.remove("hide");
  const sc=SCENARIOS.find(x=>x.id===G.scenario.id)||G.scenario;
  $("#reBtn").onclick=()=>startMission(sc);
  $("#goBtn").onclick=()=>{ saidOnceReset(); showBrief(); };
}
function saidOnceReset(){ for(const k in saidOnce) delete saidOnce[k]; detLockSaid=false; }

/* ---------- boot ---------- */
resize(); showBrief(); requestAnimationFrame(loop);
try{ audio(); updateSndStat(); }catch(e){}   // start decoding samples immediately (context stays suspended until first tap)
})();
</script>
<script>
if("serviceWorker" in navigator){
  addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js").then(reg=>{ try{ reg.update(); }catch(e){} }).catch(()=>{});
  });
  let reloaded=false;
  navigator.serviceWorker.addEventListener("controllerchange",()=>{
    if(reloaded) return; reloaded=true; location.reload();   // a new worker took over → load fresh assets once
  });
}
</script>
</body>
</html>
